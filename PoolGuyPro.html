  <script>
    // Live reload: watch all JSX files for changes
    const _watchFiles = [
      'ios-frame.jsx','tweaks-panel.jsx','components.jsx','brand.jsx','data.jsx',
      'screens/login.jsx',
      'screens/home.jsx','screens/marketplace.jsx','screens/quickpools.jsx',
      'screens/post.jsx','screens/work.jsx','screens/profile.jsx',
      'screens/overlays.jsx','app.jsx',
    ];
    let _lastSig = '';
    setInterval(async () => {
      try {
        const tags = await Promise.all(
          _watchFiles.map(f => fetch(f + '?_lrp=' + Date.now(), {method:'HEAD', cache:'no-store'})
            .then(r => r.headers.get('last-modified') || r.headers.get('etag') || ''))
        );
        const sig = tags.join('|');
        if (_lastSig && sig !== _lastSig) location.reload();
        _lastSig = sig;
      } catch(e) {}
    }, 1500);
  </script>
