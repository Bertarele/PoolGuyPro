<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>PoolGuyX — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #1a1f2e; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .admin-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
    .admin-table thead tr { border-bottom: 1px solid #1e293b; }
    .admin-table th { padding: 10px 12px; text-align: left; color: #64748b; font-weight: 600; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
    .admin-table tbody tr { border-bottom: 1px solid #1e293b18; transition: background .1s; }
    .admin-table tbody tr:hover { background: #1e293b50; }
    .admin-table td { padding: 10px 12px; color: #cbd5e1; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
    .act-btn { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; font-family: inherit; border: 1px solid; }
    .act-btn-view   { border-color: #0EBAC740; background: #0EBAC715; color: #0EBAC7; }
    .act-btn-ok     { border-color: #22c55e40; background: #22c55e15; color: #22c55e; }
    .act-btn-warn   { border-color: #f59e0b40; background: #f59e0b15; color: #f59e0b; }
    .act-btn-purple { border-color: #6366f140; background: #6366f110; color: #818cf8; }
    .act-btn-red    { border-color: #ef444430; background: #ef444410; color: #ef4444; }
    /* Mobile nav overlay */
    .nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
    .nav-overlay.open { display: block; }
    /* Sidebar */
    .admin-sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 220px; background: #13161f; border-right: 1px solid #1e293b; display: flex; flex-direction: column; z-index: 50; transition: transform .25s ease; }
    @media (max-width: 767px) {
      .admin-sidebar { transform: translateX(-100%); }
      .admin-sidebar.open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0,0,0,0.6); }
      .admin-sidebar.open .sidebar-close { display: flex !important; }
      .admin-main { margin-left: 0 !important; }
      .admin-main > div:last-child { padding: 14px 14px 32px !important; }
      .admin-top-bar { display: flex !important; }
      .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Top bar (mobile only) */
    .admin-top-bar {
      display: none; position: sticky; top: 0; z-index: 30;
      background: #13161f; border-bottom: 1px solid #1e293b;
      padding: 0 16px; height: 52px;
      align-items: center; justify-content: space-between;
    }
    .hamburger { background: none; border: none; color: #94a3b8; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 8px; }
    .hamburger:hover { background: #1e293b; }
    /* Card grid for mobile marketplace review */
    .mkt-cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 540px) { .mkt-cards { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .mkt-cards { grid-template-columns: repeat(3, 1fr); } }

<script>
(function(){
  var BASE = 'https://xiszfqghizqzlwyrfjol.supabase.co';
  var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpc3pmcWdoaXpxemx3eXJmam9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNzM3NDMsImV4cCI6MjA5NTc0OTc0M30.BeRc6j0XnJteUSaA7nAjOWCS_bZ9rcBlGvw54cXcmeg';
  var _tok = null;
  window._adminGetTok = function(){ return _tok; };
  try { var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.t) _tok=s.t; } catch(e){}

  function hdrs(extra){ var h={'apikey':KEY,'Content-Type':'application/json','Authorization':'Bearer '+(_tok||KEY)}; return Object.assign(h,extra||{}); }

  function makeBuilder(table){
    var op='select', sel='*', filters=[], orderCol=null, orderAsc=true, isSingle=false, body=null;
    var run=async function(){
      var url=BASE+'/rest/v1/'+table, h=hdrs();
      if(op==='insert'){
        var r=await fetch(url,{method:'POST',headers:Object.assign({},h,{'Prefer':'return=minimal'}),body:JSON.stringify(body)});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Erro ao inserir '+r.status}};}
        return{data:null,error:null};
      }
      if(op==='update'){
        var qs=filters.join('&');
        var r=await fetch(url+(qs?'?'+qs:''),{method:'PATCH',headers:Object.assign({},h,{'Prefer':'return=representation'}),body:JSON.stringify(body)});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Erro ao atualizar '+r.status}};}
        var d=[]; try{d=await r.json();}catch(x){}
        if(!Array.isArray(d)||d.length===0) return{data:null,error:{message:'Nenhuma linha atualizada — verifique as políticas RLS do Supabase.'}};
        return{data:d,error:null};
      }
      if(op==='delete'){
        var qs=filters.join('&');
        var r=await fetch(url+(qs?'?'+qs:''),{method:'DELETE',headers:h});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Erro ao excluir '+r.status}};}
        return{data:null,error:null};
      }
      var p=['select='+encodeURIComponent(sel)];
      filters.forEach(function(f){p.push(f);});
      if(orderCol) p.push('order='+orderCol+(orderAsc?'':'.desc'));
      if(isSingle) h['Accept']='application/vnd.pgrst.object+json';
      var r=await fetch(url+'?'+p.join('&'),{headers:h});
      if(r.status===406||r.status===404) return{data:null,error:null};
      var d=await r.json();
      if(!r.ok) return{data:null,error:{message:d.message||d.hint||'Erro na consulta '+r.status}};
      return{data:d,error:null};
    };
    var b={
      select:function(c){sel=c||'*';return b;},
      eq:function(c,v){filters.push(c+'=eq.'+encodeURIComponent(v));return b;},
      neq:function(c,v){filters.push(c+'=neq.'+encodeURIComponent(v));return b;},
      order:function(c,opts){orderCol=c;orderAsc=opts?opts.ascending!==false:true;return b;},
      single:function(){isSingle=true;return b;},
      insert:function(row){op='insert';body=row;return b;},
      update:function(upd){op='update';body=upd;return b;},
      delete:function(){op='delete';return b;},
      then:function(res,rej){return run().then(res,rej);},
      catch:function(rej){return run().catch(rej);}
    };
    return b;
  }

  window.sb = {
    auth:{
      signInWithPassword:async function(creds){
        var r=await fetch(BASE+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:creds.email,password:creds.password})});
        var d=await r.json();
        if(!r.ok) return{data:null,error:{message:d.error_description||d.msg||d.message||'Credenciais inválidas'}};
        _tok=d.access_token;
        window._adminGetTok = function(){ return _tok; };
        try{localStorage.setItem('pg_admin_s',JSON.stringify({t:d.access_token,u:{id:d.user.id,email:d.user.email}}));}catch(e){}
        return{data:{user:d.user,session:d},error:null};
      },
      getSession:async function(){
        try{var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.u) return{data:{session:{user:s.u,access_token:s.t}}};}catch(e){}
        return{data:{session:null}};
      },
      signOut:async function(){
        try{if(_tok) await fetch(BASE+'/auth/v1/logout',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+_tok}});}catch(e){}
        _tok=null; try{localStorage.removeItem('pg_admin_s');}catch(e){}
      }
    },
    from:function(table){return makeBuilder(table);},
  };
})();
</script>

// ── Card de estatística ───────────────────────────────────────
function StatCard({ label, value, color, icon }) {
  return (
    <div style={{background:'#1a1f2e', borderRadius:14, padding:'16px 18px', border:'1px solid #1e293b', display:'flex', alignItems:'center', gap:14}}>
      <div style={{width:44, height:44, borderRadius:11, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', color, flexShrink:0}}>{icon}</div>
      <div>
        <div style={{fontSize:26, fontWeight:700, lineHeight:1, color:'#f1f5f9'}}>{value ?? '—'}</div>
        <div style={{fontSize:12, color:'#64748b', marginTop:3, fontWeight:500}}>{label}</div>
      </div>
    </div>
  );
}

// ── Tabela de dados ───────────────────────────────────────────
function DataTable({ columns, rows, onDelete, onPromote, onApprove, onReject, onEdit, onView, loading }) {
  if (loading) return <div style={{padding:32, textAlign:'center', color:'#64748b'}}>Carregando…</div>;
  if (!rows.length) return <div style={{padding:32, textAlign:'center', color:'#64748b'}}>Nenhum registro encontrado.</div>;
  return (
    <div className="admin-table-wrap">
      <table className="admin-table">
        <thead>
          <tr>
            {columns.map(c => <th key={c.key}>{c.label}</th>)}
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={row.id || i}>
              {columns.map(c => (
                <td key={c.key} style={{color: c.key==='role' ? (row[c.key]==='admin'?'#0EBAC7':'#94a3b8') : undefined}}>
                  {c.render ? c.render(row[c.key], row) : (row[c.key] ?? '—')}
                </td>
              ))}
              <td>
                <div style={{display:'flex', gap:5, flexWrap:'wrap'}}>
                  {onView && <button className="act-btn act-btn-view" onClick={()=>onView(row)}>👁 Ver</button>}
                  {onApprove && row.status !== 'approved' && <button className="act-btn act-btn-ok" onClick={()=>onApprove(row)}>✓ Aprovar</button>}
                  {onReject  && row.status !== 'approved' && <button className="act-btn act-btn-warn" onClick={()=>onReject(row)}>✗ Rejeitar</button>}
                  {onPromote && <button className="act-btn act-btn-purple" onClick={()=>onPromote(row)}>{IC.shield} {row.role==='admin'?'Remover admin':'Admin'}</button>}
                  {onEdit    && <button className="act-btn act-btn-purple" onClick={()=>onEdit(row)}>{IC.edit} Editar</button>}
                  {onDelete  && <button className="act-btn act-btn-red" onClick={()=>onDelete(row)}>{IC.trash} Excluir</button>}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Tela de login ─────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [email,   setEmail]   = React.useState('');
  const [pass,    setPass]    = React.useState('');
  const [error,   setError]   = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email || !pass || loading) return;
    setLoading(true); setError('');
    try {
      const { data, error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pass });
      if (err) throw err;
      const { data: profile } = await window.sb.from('profiles').select('role').eq('id', data.user.id).single();
      if (!profile || profile.role !== 'admin') {
        await window.sb.auth.signOut();
        throw new Error('Acesso negado — somente admins.');
      }
      onLogin(data.user, profile);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0f1117', padding:'24px 16px'}}>
      <div style={{width:'100%', maxWidth:380, background:'#1a1f2e', borderRadius:20, padding:'28px 24px', border:'1px solid #1e293b', boxShadow:'0 32px 80px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:28}}>
          <div style={{width:44, height:44, borderRadius:12, background:'linear-gradient(135deg,#0EBAC7,#0D7280)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:18, flexShrink:0}}>PX</div>
          <div>
            <div style={{fontWeight:700, fontSize:17, color:'#f1f5f9'}}>Painel Admin</div>
            <div style={{fontSize:12, color:'#64748b'}}>PoolGuyX — Acesso restrito</div>
          </div>
        </div>
        <form onSubmit={handleSubmit} style={{display:'flex', flexDirection:'column', gap:14}}>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'.06em', textTransform:'uppercase'}}>E-mail</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'.06em', textTransform:'uppercase'}}>Senha</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          {error && <div style={{fontSize:12.5, color:'#ef4444', background:'#ef44441a', border:'1px solid #ef444430', borderRadius:8, padding:'9px 12px'}}>{error}</div>}
          <button type="submit" disabled={loading} style={{height:48, borderRadius:12, border:'none', fontWeight:700, fontSize:15, background:'linear-gradient(135deg,#0EBAC7,#0D7280)', color:'#fff', boxShadow:'0 6px 20px rgba(14,186,199,0.3)', opacity:loading?0.7:1}}>
            {loading ? 'Entrando…' : 'Entrar'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Modal de detalhes completos (fotos + todas as info) ───────
function ViewMarketModal({ row, onClose, onApprove, onReject }) {
  const photos = (row.photo_urls && row.photo_urls.length > 0)
    ? row.photo_urls : (row.photo_url ? [row.photo_url] : []);
  const [imgIdx, setImgIdx] = React.useState(0);
  const prev = () => setImgIdx(i => (i-1+photos.length)%photos.length);
  const next = () => setImgIdx(i => (i+1)%photos.length);
  const fmtDate = (d) => d ? new Date(d).toLocaleString('pt-BR', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const Field = ({label, value, full}) => value ? (
    <div style={{padding:'10px 13px', background:'#0f1117', borderRadius:10, border:'1px solid #1e293b', gridColumn:full?'1/-1':undefined}}>
      <div style={{fontSize:10, fontWeight:700, color:'#475569', letterSpacing:'.07em', textTransform:'uppercase', marginBottom:4}}>{label}</div>
      <div style={{fontSize:13, fontWeight:500, color:'#cbd5e1', lineHeight:1.5}}>{value}</div>
    </div>
  ) : null;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,width:'100%',maxWidth:640,border:'1px solid #334155',boxShadow:'0 32px 80px rgba(0,0,0,0.7)',overflow:'hidden'}}>

        {/* Foto */}
        <div style={{position:'relative', height:260, background:'#0f1117'}}>
          {photos.length > 0 ? (
            <img src={photos[imgIdx]} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          ) : (
            <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:'#334155'}}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <div style={{fontSize:13,color:'#475569'}}>Nenhuma foto enviada</div>
            </div>
          )}
          {photos.length > 1 && (
            <>
              <button onClick={prev} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',width:34,height:34,borderRadius:'50%',border:'none',background:'rgba(0,0,0,0.6)',color:'#fff',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>

            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              {row.price_mode==='neg'
                ? <span style={{fontSize:13,fontWeight:700,padding:'4px 11px',borderRadius:999,background:'#1e293b',color:'#94a3b8',border:'1px solid #334155'}}>🤝 Negociável</span>

            </div>
          </div>

          {/* Badges */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {[row.cat, row.condition, row.rent_period].filter(Boolean).map((b,i)=>(

            ))}
          </div>

          {/* Descrição */}
          {row.description && (
            <div style={{marginBottom:14,padding:'12px 14px',background:'#0f1117',borderRadius:12,border:'1px solid #1e293b'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#475569',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>DESCRIÇÃO</div>

            </div>
          )}

          {/* Grid de detalhes */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:16}}>
            <Field label="Autor" value={row.author}/>
            <Field label="Publicado em" value={fmtDate(row.created_at)}/>
            <Field label="Categoria" value={row.cat}/>
            <Field label="Condição" value={row.condition}/>
            <Field label="Fotos enviadas" value={photos.length>0 ? photos.length+' foto'+(photos.length!==1?'s':'') : 'Nenhuma'}/>

          {/* Thumbnails das fotos */}
          {photos.length > 0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,fontWeight:700,color:'#475569',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8}}>FOTOS ({photos.length})</div>

                {photos.map((url,i)=>(

                    <img src={url} alt={'Foto '+(i+1)} style={{width:68,height:68,objectFit:'cover',borderRadius:8,border:'2px solid '+(i===imgIdx?'#0EBAC7':'#334155'),cursor:'pointer',transition:'border-color .2s'}}

                      onClick={e=>{e.preventDefault();setImgIdx(i);}}/>
                  </a>
                ))}
              </div>
            </div>
          )}

          {/* Botões de ação */}
          <div style={{display:'flex',gap:9}}>
            {row.status!=='approved' && onApprove && (
              <button onClick={()=>{onApprove(row);onClose();}} style={{flex:2,height:46,borderRadius:12,border:'none',cursor:'pointer',fontFamily:'inherit',background:'linear-gradient(135deg,#22c55e,#16a34a)',color:'#fff',fontWeight:700,fontSize:14}}>
                ✓ Aprovar e Publicar
              </button>
            )}
            {row.status!=='approved' && onReject && (
              <button onClick={()=>{onReject(row);onClose();}} style={{flex:1,height:46,borderRadius:12,border:'1px solid #f59e0b50',background:'#f59e0b18',color:'#f59e0b',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                ✗ Rejeitar

            )}
            {row.status==='approved' && (
              <div style={{flex:1,height:46,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:12,background:'#22c55e18',border:'1px solid #22c55e30',color:'#22c55e',fontWeight:600,fontSize:13}}>
                ✓ Já publicado
              </div>
            )}
            <button onClick={onClose} style={{flex:1,height:46,borderRadius:12,border:'1px solid #334155',background:'transparent',color:'#64748b',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>Fechar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function EditMarketModal({ row, onClose, onSave }) {
  const [form, setForm] = React.useState({
    name:       row.name       || '',
    type:       row.type       || 'sell',
    cat:        row.cat        || '',
    condition:  row.condition  || '',
    price:      row.price      || '',
    price_mode: row.price_mode || 'fixed',
    loc:        row.loc        || '',
    status:     row.status     || 'pending',
    description:row.description|| '',
    route_name: row.route_name || '',
    area:       row.area       || '',
    asking:     row.asking     || '',
    clients:    row.clients    || '',
    revenue:    row.revenue    || '',
  });
  const [saving, setSaving] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = { style:{width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid #334155',background:'#0f1117',color:'#f1f5f9',fontSize:13,outline:'none',fontFamily:'inherit'} };

  const handleSave = async () => {
    setSaving(true);
    const { error } = await window.sb.from('marketplace').update(form).eq('id', row.id);
    setSaving(false);
    if (error) { alert('Erro: ' + error.message); return; }
    onSave({...row, ...form});
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:16,color:'#f1f5f9'}}>✏️ Editar Anúncio</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer',lineHeight:1,padding:4}}>{IC.close}</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{gridColumn:'1/-1'}}>{lbl('Título / Nome')}<input {...inp} value={form.name} onChange={e=>set('name',e.target.value)}/></div>
          <div>{lbl('Tipo')}<select {...inp} value={form.type} onChange={e=>set('type',e.target.value)}><option value="sell">Venda</option><option value="rent">Aluguel</option><option value="route">Rota</option></select></div>
          <div>{lbl('Status')}<select {...inp} value={form.status} onChange={e=>set('status',e.target.value)}><option value="pending">Pendente</option><option value="approved">Aprovado</option></select></div>
          <div>{lbl('Categoria')}<input {...inp} value={form.cat} onChange={e=>set('cat',e.target.value)} placeholder="Pumps, Vacuum…"/></div>
          <div>{lbl('Condição')}<input {...inp} value={form.condition} onChange={e=>set('condition',e.target.value)} placeholder="Novo, Usado…"/></div>
          <div>{lbl('Preço (R$)')}<input {...inp} type="number" value={form.price} onChange={e=>set('price',e.target.value)}/></div>
          <div>{lbl('Modo de preço')}<select {...inp} value={form.price_mode} onChange={e=>set('price_mode',e.target.value)}><option value="fixed">Fixo</option><option value="neg">Negociável</option></select></div>
          <div style={{gridColumn:'1/-1'}}>{lbl('Localização')}<input {...inp} value={form.loc} onChange={e=>set('loc',e.target.value)}/></div>
          <div style={{gridColumn:'1/-1'}}>{lbl('Descrição')}<textarea {...inp} value={form.description} onChange={e=>set('description',e.target.value)} rows={3} style={{...inp.style,resize:'vertical',minHeight:72,lineHeight:1.5}}/></div>
          {form.type==='route' && <>
            <div style={{gridColumn:'1/-1'}}>{lbl('Nome da rota')}<input {...inp} value={form.route_name} onChange={e=>set('route_name',e.target.value)}/></div>
            <div>{lbl('Clientes')}<input {...inp} type="number" value={form.clients} onChange={e=>set('clients',e.target.value)}/></div>
            <div>{lbl('Receita/mês')}<input {...inp} type="number" value={form.revenue} onChange={e=>set('revenue',e.target.value)}/></div>
            <div>{lbl('Pedindo ($)')}<input {...inp} type="number" value={form.asking} onChange={e=>set('asking',e.target.value)}/></div>
            <div>{lbl('Região')}<input {...inp} value={form.area} onChange={e=>set('area',e.target.value)}/></div>
          </>}
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button onClick={onClose} style={{flex:1,height:44,borderRadius:12,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
          <button onClick={handleSave} disabled={saving} style={{flex:2,height:44,borderRadius:12,border:'none',background:'linear-gradient(135deg,#0EBAC7,#0D7280)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.7:1}}>
            {saving ? 'Salvando…' : 'Salvar Alterações'}
          </button>
        </div>
      </div>
    </div>
  );
}

  React.useEffect(() => {
    if (!userId) return;

      setLoading(true);

      const [profRes, authRes, disputesAsReporter, disputesAsReported, ratingsRes, rentalsRes, photosRes] = await Promise.all([
        window.sb.from('profiles').select('*').eq('id', userId).single(),
        fetch(BASE + '/auth/v1/admin/users/' + userId, { headers:{ apikey:SRK, Authorization:'Bearer '+SRK } }).then(r=>r.json()).catch(()=>({})),
        window.sb.from('dispute_reports').select('id').eq('reporter_id', userId),
        window.sb.from('dispute_reports').select('id').eq('reported_user_id', userId),
        window.sb.from('rental_ratings').select('stars').eq('ratee_id', userId),
        window.sb.from('rental_requests').select('id,status').eq('requester_id', userId),
        disputeRequestId
          ? window.sb.from('rental_photos').select('type,photo_url').eq('request_id', disputeRequestId)
          : Promise.resolve({ data: [] }),
      ]);
      setProfile({ ...(profRes.data||{}), email: authRes.email || profRes.data?.email || '' });
      const stars = ratingsRes.data?.map(r=>r.stars)||[];
      const avgStars = stars.length ? (stars.reduce((a,b)=>a+b,0)/stars.length).toFixed(1) : null;
      setStats({
        reportedBy:    (disputesAsReporter.data||[]).length,
        reportedAgainst: (disputesAsReported.data||[]).length,
        rentals:       (rentalsRes.data||[]).length,
        avgRating:     avgStars,
        ratingCount:   stars.length,

        setPhotos({
          before: photosRes.data.filter(p=>p.type==='before').map(p=>p.photo_url),
          after:  photosRes.data.filter(p=>p.type==='after').map(p=>p.photo_url),
        });
      }
      setLoading(false);
    };
    load();

        {loading ? (

                    {(profile?.name||userName||'?')[0].toUpperCase()}

              <div>
                <div style={{fontSize:20,fontWeight:800,color:'#f1f5f9'}}>{profile?.name || userName || '—'}</div>

                      {photos.after.map((url,i)=>(
                        <a key={i} href={url} target="_blank" rel="noreferrer">

                    </div>

                <a href={`mailto:${profile.email}?subject=PoolGuyX - Ocorrência de aluguel`}

                Fechar
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                {/* Tabela */}
                {displayRows.length>0 && (
                  <div style={{background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b',overflow:'hidden'}}>
                    <DataTable loading={loading} rows={displayRows} columns={mktCols}
                      onView={row=>setViewRow(row)}
                      onApprove={approveMarket}
                      onReject={rejectMarket}
                      onEdit={row=>setEditRow(row)}
                      onDelete={row=>deleteRow('marketplace',row)}
                    />
                  </div>
                )}
              </div>
            );
          })()}

          {/* ── Férias ── */}
          {section==='vacations' && (
            <div>
              <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Rotas de Férias <span style={{fontSize:13,color:'#64748b',fontWeight:400}}>({vacs.length})</span></h1>
              <p style={{fontSize:13,color:'#64748b',marginBottom:20}}>Todas as rotas de férias publicadas.</p>
              <div style={{background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b',overflow:'hidden'}}>
                <DataTable loading={loading} rows={vacs}
                  columns={[
                    {key:'month_idx', label:'Mês', render:(v,r)=>{const m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return (m[v]||v)+' '+(r.year||'');}},
                    {key:'price',      label:'Preço'},
                    {key:'price_mode', label:'Modo'},
                    {key:'author',     label:'Autor'},
                    {key:'created_at', label:'Publicado', render:fmtDate},
                  ]}
                  onDelete={row=>deleteRow('vacations',row)}
                />
              </div>
            </div>
          )}

          {/* ── Reclamações ── */}
          {section==='disputes' && (()=>{
            const sevColor = { minor:'#EAB308', serious:'#F59E0B', critical:'#EF4444' };
            const sevLabel = { minor:'🟡 Leve', serious:'🟠 Sério', critical:'🔴 Crítico' };
            const stColor  = { pending:'#F59E0B', resolved:'#22c55e' };
            const guideText = {
              minor:    '💡 Resolução sugerida: Entre em contato com as partes por e-mail/telefone e ouça os dois lados. Geralmente resolvido com conversa.',
              serious:  '⚠️ Resolução sugerida: Solicite fotos de evidência às partes. Se confirmado dano, aplique aviso ao renter. Reincidência = banimento.',
              critical: '🚨 Resolução sugerida: Item não devolvido é crime (apropriação indébita). Colete prints do chat, fotos antes/depois e ID. Considere banimento imediato e oriente o proprietário a registrar B.O.',
            };
            return (
              <div>
                <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>
                  Reclamações <span style={{fontSize:13,color:'#64748b',fontWeight:400}}>({disputes.length} total · {disputeCount} pendente{disputeCount!==1?'s':''})</span>
                </h1>
                <p style={{fontSize:13,color:'#64748b',marginBottom:20}}>Reports de problemas em aluguéis. Clique nos nomes para ver perfil completo.</p>

                {disputes.length === 0 && !loading && (
                  <div style={{padding:48,textAlign:'center',color:'#475569',background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b'}}>
                    <div style={{fontSize:32,marginBottom:8}}>✅</div>
                    <div style={{fontWeight:600}}>Nenhuma reclamação registrada.</div>
                  </div>
                )}

                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  {disputes.map(d => {
                    const isPending = d.status === 'pending';
                    const noteVal = editingNote[d.id] ?? (d.admin_note || '');
                    return (
                      <div key={d.id} style={{
                        background:'#1a1f2e',borderRadius:16,
                        border:`1px solid ${isPending ? sevColor[d.severity]+'50' : '#1e293b'}`,
                        overflow:'hidden',
                      }}>
                        {/* Severity strip */}
                        <div style={{height:3,background:isPending?sevColor[d.severity]:'#1e293b'}}/>
                        <div style={{padding:'16px 18px'}}>

                          {/* Header row */}
                          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:10}}>
                            <span style={{fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999,
                              background:sevColor[d.severity]+'20',color:sevColor[d.severity],border:'1px solid '+sevColor[d.severity]+'40'}}>
                              {sevLabel[d.severity]||d.severity}
                            </span>
                            <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:999,
                              background:(stColor[d.status]||'#64748b')+'20',color:stColor[d.status]||'#64748b',
                              border:'1px solid '+(stColor[d.status]||'#334155')+'40'}}>
                              {d.status==='pending'?'⏳ Pendente':'✓ Resolvido'}
                            </span>
                            <span style={{fontSize:11,color:'#475569',marginLeft:'auto'}}>{fmtDateTime(d.created_at)}</span>
                          </div>

                          {/* Listing */}
                          <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:10}}>
                            📋 {d.listing_name||'Item de aluguel'}
                          </div>

                          {/* Parties — CLICKABLE names */}
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                            <button onClick={()=>setViewUserModal({userId:d.reporter_id,userName:d.reporter_name,disputeRequestId:d.rental_request_id})}
                              style={{textAlign:'left',padding:'10px 12px',background:'#0f1117',borderRadius:10,border:'1px solid #1e293b',cursor:'pointer',fontFamily:'inherit',transition:'border-color .15s'}}
                              onMouseEnter={e=>e.currentTarget.style.borderColor='#0EBAC7'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e293b'}>
                              <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>👤 Proprietário (reportou)</div>
                              <div style={{fontSize:13,fontWeight:700,color:'#0EBAC7'}}>{d.reporter_name||'—'}</div>
                              <div style={{fontSize:10,color:'#475569',marginTop:2}}>Clique para ver perfil</div>
                            </button>
                            <button onClick={()=>setViewUserModal({userId:d.reported_user_id,userName:d.reported_name,disputeRequestId:d.rental_request_id})}
                              style={{textAlign:'left',padding:'10px 12px',background:'#0f1117',borderRadius:10,border:'1px solid #1e293b',cursor:'pointer',fontFamily:'inherit',transition:'border-color .15s'}}
                              onMouseEnter={e=>e.currentTarget.style.borderColor='#ef4444'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e293b'}>
                              <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>⚠ Renter (reportado)</div>
                              <div style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{d.reported_name||'—'}</div>
                              <div style={{fontSize:10,color:'#475569',marginTop:2}}>Clique para ver perfil</div>
                            </button>
                          </div>

                          {/* Description */}
                          <div style={{background:'#0f1117',borderRadius:10,padding:'10px 12px',marginBottom:12,border:'1px solid #1e293b'}}>
                            <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>DESCRIÇÃO DO PROBLEMA</div>
                            <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.65,whiteSpace:'pre-wrap'}}>{d.description}</div>
                          </div>

                          {/* Resolution guide */}
                          {isPending && (
                            <div style={{background:`rgba(${d.severity==='critical'?'239,68,68':d.severity==='serious'?'245,158,11':'234,179,8'},0.06)`,
                              borderRadius:10,padding:'10px 12px',marginBottom:12,
                              border:`1px solid rgba(${d.severity==='critical'?'239,68,68':d.severity==='serious'?'245,158,11':'234,179,8'},0.2)`,
                              fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
                              {guideText[d.severity]||guideText.serious}
                            </div>
                          )}

                          {/* Admin note */}
                          <div style={{marginBottom:12}}>
                            <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>📝 Nota interna (admin)</div>
                            <textarea
                              value={noteVal}
                              onChange={e=>setEditingNote(prev=>({...prev,[d.id]:e.target.value}))}
                              placeholder="Anote aqui o que foi decidido, histórico de contato, etc..."
                              rows={2}
                              style={{width:'100%',background:'#0f1117',border:'1px solid #1e293b',borderRadius:9,
                                color:'#cbd5e1',fontFamily:'inherit',fontSize:12.5,padding:'9px 11px',
                                resize:'vertical',boxSizing:'border-box',outline:'none',lineHeight:1.5}}
                            />
                            {noteVal !== (d.admin_note||'') && (
                              <button onClick={()=>saveAdminNote(d.id)}
                                style={{marginTop:5,padding:'5px 14px',borderRadius:8,border:'none',cursor:'pointer',
                                  background:'#6366f1',color:'#fff',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>
                                💾 Salvar nota
                              </button>
                            )}
                          </div>

                          {/* Actions */}
                          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            {isPending && (<>
                              <button className="act-btn act-btn-ok" onClick={()=>resolveDispute(d)} style={{padding:'7px 14px'}}>
                                ✓ Marcar resolvido
                              </button>
                              <button onClick={()=>banUserFromDispute(d)}
                                style={{padding:'7px 14px',borderRadius:8,border:'1px solid rgba(239,68,68,0.4)',
                                  background:'rgba(239,68,68,0.1)',color:'#ef4444',fontSize:11,fontWeight:700,
                                  cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:4}}>
                                🚫 Banir renter
                              </button>
                            </>)}
                            {!isPending && d.resolved_at && (
                              <span style={{fontSize:11,color:'#475569',padding:'4px 0'}}>✓ Resolvido em {fmtDateTime(d.resolved_at)}</span>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

        </div>{/* fim padding */}
      </div>{/* fim admin-main */}

      {/* ── Modal perfil usuário (reclamações) ── */}
      {viewUserModal && (
        <UserDetailModal
          userId={viewUserModal.userId}
          userName={viewUserModal.userName}
          disputeRequestId={viewUserModal.disputeRequestId}
          onClose={()=>setViewUserModal(null)}
        />
      )}

      {/* ── Modal View ── */}
      {viewRow && <ViewMarketModal row={viewRow} onClose={()=>setViewRow(null)} onApprove={approveMarket} onReject={rejectMarket}/>}

      {/* ── Modal Edit ── */}
      {editRow && <EditMarketModal row={editRow} onClose={()=>setEditRow(null)} onSave={(updated)=>{setMarket(p=>p.map(m=>m.id===updated.id?updated:m));setEditRow(null);showToast('✓ Anúncio atualizado!');}}/>}

      {/* ── Toast ── */}
      {toast && (
        <div style={{position:'fixed',bottom:24,right:20,left:20,maxWidth:360,margin:'0 auto',padding:'12px 18px',borderRadius:12,background:toast.ok?'#0EBAC7':'#ef4444',color:'#fff',fontWeight:600,fontSize:13.5,boxShadow:'0 8px 24px rgba(0,0,0,0.4)',zIndex:999,textAlign:'center'}}>
          {toast.msg}
        </div>
      )}

      {/* ── Modal RLS ── */}
      {rlsOpen && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setRlsOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,padding:'24px 20px',maxWidth:540,width:'100%',border:'1px solid #334155',boxShadow:'0 24px 64px rgba(0,0,0,0.6)',maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{fontSize:24}}>🔒</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:'#f1f5f9'}}>RLS do Supabase está bloqueando</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:2}}>Execute este SQL no Supabase → SQL Editor:</div>
              </div>
            </div>
            <pre style={{background:'#0f1117',borderRadius:10,padding:'12px 14px',fontSize:11.5,color:'#7dd3fc',overflowX:'auto',lineHeight:1.7,border:'1px solid #1e293b',margin:'0 0 16px'}}>{`-- Marketplace
DROP POLICY IF EXISTS "Admins can update marketplace" ON marketplace;
DROP POLICY IF EXISTS "Admins can delete marketplace" ON marketplace;
CREATE POLICY "Admins can update marketplace" ON marketplace FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete marketplace" ON marketplace FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
-- Jobs / Techs / Vacations
DROP POLICY IF EXISTS "Admins can delete jobs" ON jobs;
DROP POLICY IF EXISTS "Admins can delete techs" ON techs;
DROP POLICY IF EXISTS "Admins can delete vacations" ON vacations;
CREATE POLICY "Admins can delete jobs" ON jobs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete techs" ON techs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete vacations" ON vacations FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
-- Profiles (usuarios)
DROP POLICY IF EXISTS "Admins can delete profiles" ON profiles;
DROP POLICY IF EXISTS "Admins can update any profile" ON profiles;
CREATE POLICY "Admins can delete profiles" ON profiles FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'));
CREATE POLICY "Admins can update any profile" ON profiles FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'))
WITH CHECK (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'));`}</pre>
            <button onClick={()=>setRlsOpen(false)} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'#0EBAC7',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>
              Entendido — vou executar o SQL
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────
function Root() {
  const [adminUser, setAdminUser] = React.useState(null);
  const [checking,  setChecking]  = React.useState(true);

  React.useEffect(() => {
    if(!window.sb){ setChecking(false); return; }
    window.sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const {data:profile} = await window.sb.from('profiles').select('role').eq('id',session.user.id).single();
        if(profile?.role==='admin') setAdminUser(session.user);
      }
      setChecking(false);
    });
  },[]);

  const handleLogout = async () => { await window.sb.auth.signOut(); setAdminUser(null); };

  if(checking) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}>
      <div style={{color:'#64748b',fontSize:14}}>Carregando…</div>
    </div>
  );

  if(!adminUser) return <AdminLogin onLogin={(u)=>setAdminUser(u)}/>;
  return <AdminApp adminUser={adminUser} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
