<script>
(function(){
  var BASE = 'https://xiszfqghizqzlwyrfjol.supabase.co';
  var KEY  = 'sb_publishable_2C7PFtLNiXt3IziFnMVb4w_1YGfBqyX';
  // SEGURANÇA: a service_role key foi REMOVIDA do cliente.
  // Operações comuns usam o token de sessão do admin (_tok) + policies RLS "admin_*".
  // Operações de auth privilegiadas (ver/deletar conta) vão pela Edge Function
  // 'admin-user', que guarda a service_role no servidor e valida o admin.
  var _tok = null;
  var _refreshing = null; // pending refresh promise — avoids race conditions
  window._adminGetTok = function(){ return _tok; };
  try { var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.t) _tok=s.t; } catch(e){}

  // Access tokens expire in 20min (Supabase default) — admin sessions routinely
  // stay open longer than that. Without refresh, every request after expiry
  // fails with "JWT expired" until the admin manually logs out and back in.
  async function _doRefresh() {
    try {
      var stored = JSON.parse(localStorage.getItem('pg_admin_s') || 'null');
      if (!stored || !stored.r) return false;
      var resp = await fetch(BASE + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: stored.r }),
      });
      if (!resp.ok) return false;
      var d = await resp.json();
      if (!d.access_token) return false;
      _tok = d.access_token;
      try {
        localStorage.setItem('pg_admin_s', JSON.stringify({ t: d.access_token, r: d.refresh_token || stored.r, u: stored.u }));
      } catch(e) {}
      return true;
    } catch(e) { return false; }
  }
  function _refreshOnce() {
    if (_refreshing) return _refreshing;
    _refreshing = _doRefresh().finally(function(){ _refreshing = null; });
    return _refreshing;
  }
  function _isExpired(msg) {
    return msg && (msg.indexOf('JWT expired') !== -1 || msg.indexOf('invalid JWT') !== -1 || msg.indexOf('token is expired') !== -1);
  }

  function hdrs(extra){ var h={'apikey':KEY,'Content-Type':'application/json','Authorization':'Bearer '+(_tok||KEY)}; return Object.assign(h,extra||{}); }
  // adminHdrs agora usa o token de sessão do admin (não mais a service_role).
  function adminHdrs(extra){ var h={'apikey':KEY,'Content-Type':'application/json','Authorization':'Bearer '+(_tok||KEY)}; return Object.assign(h,extra||{}); }

  // Chama a Edge Function admin-user para operações de auth privilegiadas.
  window._adminUserAction = async function(action, userId, _retried){
    var r = await fetch(BASE+'/functions/v1/admin-user', {
      method:'POST',
      headers:{'apikey':KEY,'Authorization':'Bearer '+(_tok||''),'Content-Type':'application/json'},
      body:JSON.stringify({ action: action, user_id: userId })
    });
    var d = {}; try { d = await r.json(); } catch(e){}
    if (!r.ok && !_retried && (r.status===401 || _isExpired(d.error||d.message||''))) {
      var ok = await _refreshOnce();
      if (ok) return window._adminUserAction(action, userId, true);
    }
    return { ok: r.ok, status: r.status, data: d };
  };

  function makeBuilder(table){
    var op='select', sel='*', filters=[], orderCol=null, orderAsc=true, isSingle=false, body=null, _limit=null, _in=null, _inCol=null;
    var run=async function(retried){
      var url=BASE+'/rest/v1/'+table, h=hdrs();
      if(op==='insert'){
        var ah=adminHdrs({'Prefer':'return=minimal'});
        var r=await fetch(url,{method:'POST',headers:ah,body:JSON.stringify(body)});
        if(!r.ok){
          var e={}; try{e=await r.json();}catch(x){}
          if(!retried && (r.status===401 || _isExpired(e.message||''))){ var ok=await _refreshOnce(); if(ok) return run(true); }
          return{data:null,error:{message:e.message||'Erro ao inserir '+r.status}};
        }
        return{data:null,error:null};
      }
      if(op==='update'){
        var qs=filters.join('&');
        var ah=adminHdrs({'Prefer':'return=representation'});
        var r=await fetch(url+(qs?'?'+qs:''),{method:'PATCH',headers:ah,body:JSON.stringify(body)});
        if(!r.ok){
          var e={}; try{e=await r.json();}catch(x){}
          if(!retried && (r.status===401 || _isExpired(e.message||''))){ var ok=await _refreshOnce(); if(ok) return run(true); }
          return{data:null,error:{message:e.message||'Erro ao atualizar '+r.status}};
        }
        var d=[]; try{d=await r.json();}catch(x){}
        if(!Array.isArray(d)||d.length===0) return{data:null,error:{message:'Nenhuma linha atualizada.'}};
        return{data:d,error:null};
      }
      if(op==='delete'){
        var qs=filters.join('&');
        var ah=adminHdrs();
        var r=await fetch(url+(qs?'?'+qs:''),{method:'DELETE',headers:ah});
        if(!r.ok){
          var e={}; try{e=await r.json();}catch(x){}
          if(!retried && (r.status===401 || _isExpired(e.message||''))){ var ok=await _refreshOnce(); if(ok) return run(true); }
          return{data:null,error:{message:e.message||'Erro ao excluir '+r.status}};
        }
        return{data:null,error:null};
      }
      var p=['select='+encodeURIComponent(sel)];
      filters.forEach(function(f){p.push(f);});
      if(_inCol&&_in&&_in.length) p.push(_inCol+'=in.('+_in.map(function(v){return encodeURIComponent(v);}).join(',')+')');
      if(orderCol) p.push('order='+orderCol+(orderAsc?'':'.desc'));
      if(_limit) p.push('limit='+_limit);
      if(isSingle) h['Accept']='application/vnd.pgrst.object+json';
      var r=await fetch(url+'?'+p.join('&'),{headers:h});
      if(r.status===406||r.status===404) return{data:null,error:null};
      var d=await r.json();
      if(!r.ok){
        if(!retried && (r.status===401 || _isExpired(d.message||''))){ var ok=await _refreshOnce(); if(ok) return run(true); }
        return{data:null,error:{message:d.message||d.hint||'Erro na consulta '+r.status}};
      }
      return{data:d,error:null};
    };
    var b={
      select:function(c){sel=c||'*';return b;},
      eq:function(c,v){filters.push(c+'=eq.'+encodeURIComponent(v));return b;},
      neq:function(c,v){filters.push(c+'=neq.'+encodeURIComponent(v));return b;},
      in:function(c,vals){_inCol=c;_in=vals;return b;},
      order:function(c,opts){orderCol=c;orderAsc=opts?opts.ascending!==false:true;return b;},
      limit:function(n){_limit=n;return b;},
      single:function(){isSingle=true;return b;},
      maybeSingle:function(){isSingle=true;return b;},
      insert:function(row){op='insert';body=row;return b;},
      update:function(upd){op='update';body=upd;return b;},
      delete:function(){op='delete';return b;},
      then:function(res,rej){return run().then(res,rej);},
      catch:function(rej){return run().catch(rej);}
    };
    return b;
  }

  window.sb = {
    auth:{
      signInWithPassword:async function(creds){
        var r=await fetch(BASE+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:creds.email,password:creds.password})});
        var d=await r.json();
        if(!r.ok) return{data:null,error:{message:d.error_description||d.msg||d.message||'Credenciais inválidas'}};
        _tok=d.access_token;
        window._adminGetTok = function(){ return _tok; };
        try{localStorage.setItem('pg_admin_s',JSON.stringify({t:d.access_token,r:d.refresh_token||null,u:{id:d.user.id,email:d.user.email}}));}catch(e){}
        return{data:{user:d.user,session:d},error:null};
      },
      getSession:async function(){
        try{var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.u) return{data:{session:{user:s.u,access_token:s.t}}};}catch(e){}
        return{data:{session:null}};
      },
      signOut:async function(){
        try{if(_tok) await fetch(BASE+'/auth/v1/logout',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+_tok}});}catch(e){}
        _tok=null; try{localStorage.removeItem('pg_admin_s');}catch(e){}
      }
    },
    from:function(table){return makeBuilder(table);},
    storage:{
      from:function(bucket){
        return {
          upload:async function(path,file,opts){
            var url=BASE+'/storage/v1/object/'+bucket+'/'+path;
            var r=await fetch(url,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+(_tok||KEY),'Content-Type':(opts&&opts.contentType)||file.type,'x-upsert':(opts&&opts.upsert)?'true':'false'},body:file});
            if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||e.error||'Upload falhou: '+r.status}};}
            return{data:{path:path},error:null};
          },
          getPublicUrl:function(path){
            return{data:{publicUrl:BASE+'/storage/v1/object/public/'+bucket+'/'+path}};
          }
        };
      }
    },
  };
})();
</script>

function StatCard({ label, value, color, icon, onClick }) {
  return (
    <div onClick={onClick} style={{background:'#1a1f2e', borderRadius:14, padding:'16px 18px', border:'1px solid #1e293b', display:'flex', alignItems:'center', gap:14,
      cursor:onClick?'pointer':'default', transition:'background .15s, border-color .15s',}}
      onMouseEnter={e=>{ if(onClick){e.currentTarget.style.background='#1e2436'; e.currentTarget.style.borderColor=color+'40'; }}}
      onMouseLeave={e=>{ if(onClick){e.currentTarget.style.background='#1a1f2e'; e.currentTarget.style.borderColor='#1e293b'; }}}>
      <div style={{width:44, height:44, borderRadius:11, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', color, flexShrink:0}}>{icon}</div>
      <div style={{flex:1,minWidth:0}}>

        <div style={{fontSize:12, color:'#64748b', marginTop:3, fontWeight:500}}>{label}</div>

      {onClick && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.5"><polyline points="9 18 15 12 9 6"/></svg>}

  );
}

// ── Tabela de dados ───────────────────────────────────────────
function DataTable({ columns, rows, onDelete, onPromote, onApprove, onReject, onEdit, onView, onVerify, loading }) {
  if (loading) return <div style={{padding:32, textAlign:'center', color:'#64748b', fontSize:13}}>Carregando…</div>;
  if (!rows.length) return <div style={{padding:32, textAlign:'center', color:'#475569', fontSize:13}}>Nenhum registro encontrado.</div>;
  return (
    <div className="admin-table-wrap">
      <table className="admin-table">
        <thead>
          <tr>
            {columns.map(c => <th key={c.key}>{c.label}</th>)}
            <th style={{textAlign:'right'}}>Ações</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={row.id || i}>
              {columns.map(c => (
                <td key={c.key} style={{color: c.key==='role' ? (row[c.key]==='admin'?'#0EBAC7':'#94a3b8') : undefined}}>
                  {c.render ? c.render(row[c.key], row) : (row[c.key] ?? '—')}
                </td>
              ))}
              <td style={{textAlign:'right'}}>
                <div style={{display:'inline-flex', gap:4, alignItems:'center'}}>
                  {onView    && <button className="aib aib-view"   title="Ver detalhes"   onClick={()=>onView(row)}>{AIco.eye}</button>}
                  {onApprove && row.status!=='approved' && <button className="aib aib-ok"   title="Aprovar"  onClick={()=>onApprove(row)}>{AIco.check}</button>}
                  {onReject  && row.status!=='approved' && <button className="aib aib-warn" title="Rejeitar" onClick={()=>onReject(row)}>{AIco.x}</button>}
                  {onVerify  && <button className={`aib ${row.verified?'aib-red':'aib-ok'}`} title={row.verified?'Remover verificação':'Verificar identidade'} onClick={()=>onVerify(row)}>{row.verified?AIco.unbadge:AIco.badge}</button>}
                  {onPromote && <button className={`aib ${row.role==='admin'?'aib-gray':'aib-purple'}`} title={row.role==='admin'?'Remover admin':'Tornar admin'} onClick={()=>onPromote(row)}>{AIco.crown}</button>}
                  {onEdit    && <button className="aib aib-purple" title="Editar"   onClick={()=>onEdit(row)}>{AIco.edit}</button>}
                  {onDelete  && <button className="aib aib-red"    title="Excluir"  onClick={()=>onDelete(row)}>{AIco.trash}</button>}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Tela de login ─────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [email,   setEmail]   = React.useState('');
  const [pass,    setPass]    = React.useState('');
  const [error,   setError]   = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email || !pass || loading) return;
    setLoading(true); setError('');
    try {
      const { data, error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pass });
      if (err) throw err;
      const { data: profile } = await window.sb.from('profiles').select('role').eq('id', data.user.id).single();
      if (!profile || profile.role !== 'admin') {
        await window.sb.auth.signOut();
        throw new Error('Acesso negado — somente admins.');
      }
      onLogin(data.user, profile);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0f1117', padding:'24px 16px'}}>
      <div style={{width:'100%', maxWidth:380, background:'#1a1f2e', borderRadius:20, padding:'28px 24px', border:'1px solid #1e293b', boxShadow:'0 32px 80px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:28}}>
          <img src="/icone-admin.png" alt="PoolGuyX" style={{width:48, height:48, borderRadius:13, flexShrink:0, border:'1px solid #2373c340'}}/>
          <div>
            <div style={{fontWeight:800, fontSize:17, color:'#f1f5f9', letterSpacing:'-0.01em'}}>PoolGuyX Admin</div>
            <div style={{fontSize:12, color:'#475569', marginTop:2}}>Acesso restrito</div>
          </div>
        </div>
        <form onSubmit={handleSubmit} style={{display:'flex', flexDirection:'column', gap:14}}>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'.06em', textTransform:'uppercase'}}>E-mail</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'.06em', textTransform:'uppercase'}}>Senha</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          {error && <div style={{fontSize:12.5, color:'#ef4444', background:'#ef44441a', border:'1px solid #ef444430', borderRadius:8, padding:'9px 12px'}}>{error}</div>}
          <button type="submit" disabled={loading} style={{height:48, borderRadius:12, border:'none', fontWeight:700, fontSize:15, background:'linear-gradient(135deg,#0EBAC7,#0D7280)', color:'#fff', boxShadow:'0 6px 20px rgba(14,186,199,0.3)', opacity:loading?0.7:1}}>
            {loading ? 'Entrando…' : 'Entrar'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Modal de detalhes completos (fotos + todas as info) ───────
function ViewMarketModal({ row, onClose, onApprove, onReject, onDelete, onViewAuthor }) {
  const photos = (row.photo_urls && row.photo_urls.length > 0)
    ? row.photo_urls : (row.photo_url ? [row.photo_url] : []);
  const [imgIdx, setImgIdx] = React.useState(0);
  const [viewerOpen, setViewerOpen] = React.useState(false);
  const [confirmDel, setConfirmDel] = React.useState(false);
  const prev = () => setImgIdx(i => (i-1+photos.length)%photos.length);
  const next = () => setImgIdx(i => (i+1)%photos.length);
  const openViewer = (i) => { setImgIdx(i); setViewerOpen(true); };

  // Keyboard nav for lightbox
  React.useEffect(() => {
    if (!viewerOpen) return;
    const handler = (e) => {
      if (e.key === 'ArrowLeft')  prev();
      if (e.key === 'ArrowRight') next();
      if (e.key === 'Escape')     setViewerOpen(false);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [viewerOpen, photos.length]);
  const fmtDate = (d) => d ? new Date(d).toLocaleString('pt-BR', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

  const Field = ({label, value, full}) => value ? (
    <div style={{padding:'10px 13px', background:'#0f1117', borderRadius:10, border:'1px solid #1e293b', gridColumn:full?'1/-1':undefined}}>
      <div style={{fontSize:10, fontWeight:700, color:'#475569', letterSpacing:'.07em', textTransform:'uppercase', marginBottom:4}}>{label}</div>
      <div style={{fontSize:13, fontWeight:500, color:'#cbd5e1', lineHeight:1.5}}>{value}</div>

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>

        {/* Foto */}

            <img src={photos[imgIdx]} alt="" onClick={()=>openViewer(imgIdx)}

          ) : (
            <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:'#334155'}}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <div style={{fontSize:13,color:'#475569'}}>Nenhuma foto enviada</div>

          )}
          {photos.length > 1 && (
            <>
              <button onClick={prev} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',width:34,height:34,borderRadius:'50%',border:'none',background:'rgba(0,0,0,0.6)',color:'#fff',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
              <button onClick={next} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',width:34,height:34,borderRadius:'50%',border:'none',background:'rgba(0,0,0,0.6)',color:'#fff',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
              <div style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',display:'flex',gap:5}}>
                {photos.map((_,i)=><div key={i} onClick={()=>setImgIdx(i)} style={{width:i===imgIdx?18:6,height:6,borderRadius:3,cursor:'pointer',background:i===imgIdx?'#fff':'rgba(255,255,255,0.4)',transition:'width .2s'}}/>)}
              </div>
              <div style={{position:'absolute',bottom:12,right:14,fontSize:11,fontWeight:700,color:'#fff',background:'rgba(0,0,0,0.55)',padding:'2px 8px',borderRadius:999}}>
                {imgIdx+1} / {photos.length}
              </div>
            </>
          )}
          <button onClick={onClose} style={{position:'absolute',top:10,right:10,width:32,height:32,borderRadius:'50%',border:'none',background:'rgba(0,0,0,0.65)',color:'#fff',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{IC.close}</button>
          <span style={{position:'absolute',top:10,left:10,fontSize:11,fontWeight:700,padding:'4px 11px',borderRadius:8,
            background:row.status==='approved'?'rgba(34,197,94,0.9)':'rgba(245,158,11,0.9)',color:'#fff',letterSpacing:'.05em'}}>

              <button onClick={()=>{onDelete(row);onClose();}} style={{flex:1,height:40,borderRadius:10,border:'none',background:'#ef4444',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                Confirmar exclusão
              </button>
              <button onClick={()=>setConfirmDel(false)} style={{flex:1,height:40,borderRadius:10,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                Cancelar
              </button>
            </div>
          )}
        </div>
      </div>

      {/* ── Lightbox fullscreen viewer ── */}
      {viewerOpen && photos.length > 0 && (
        <div onClick={()=>setViewerOpen(false)}
          style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.95)',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
          {/* Image */}
          <img src={photos[imgIdx]} alt=""
            onClick={e=>e.stopPropagation()}
            style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain',borderRadius:4,
              boxShadow:'0 8px 60px rgba(0,0,0,0.8)',userSelect:'none'}}/>

          {/* Close */}
          <button onClick={()=>setViewerOpen(false)}
            style={{position:'fixed',top:16,right:16,width:42,height:42,borderRadius:'50%',
              border:'none',background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:20,
              cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
              backdropFilter:'blur(4px)'}}>✕</button>

          {/* Counter */}
          {photos.length > 1 && (
            <div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',
              fontSize:12,fontWeight:700,color:'#fff',background:'rgba(0,0,0,0.55)',
              padding:'4px 12px',borderRadius:999,backdropFilter:'blur(4px)'}}>
              {imgIdx+1} / {photos.length}
            </div>
          )}

          {/* Prev */}
          {photos.length > 1 && imgIdx > 0 && (
            <button onClick={e=>{e.stopPropagation();prev();}}
              style={{position:'fixed',left:16,top:'50%',transform:'translateY(-50%)',
                width:48,height:48,borderRadius:'50%',border:'none',
                background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:26,
                cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                backdropFilter:'blur(4px)'}}>‹</button>
          )}

          {/* Next */}
          {photos.length > 1 && imgIdx < photos.length-1 && (
            <button onClick={e=>{e.stopPropagation();next();}}
              style={{position:'fixed',right:16,top:'50%',transform:'translateY(-50%)',
                width:48,height:48,borderRadius:'50%',border:'none',
                background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:26,
                cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                backdropFilter:'blur(4px)'}}>›</button>
          )}

          {/* Thumbnail strip */}
          {photos.length > 1 && (
            <div onClick={e=>e.stopPropagation()}
              style={{position:'fixed',bottom:16,left:'50%',transform:'translateX(-50%)',
                display:'flex',gap:8,padding:'8px 12px',borderRadius:14,
                background:'rgba(0,0,0,0.65)',backdropFilter:'blur(8px)'}}>
              {photos.map((url,i)=>(
                <img key={i} src={url} alt="" onClick={()=>setImgIdx(i)}
                  style={{width:i===imgIdx?54:42,height:i===imgIdx?54:42,objectFit:'cover',
                    borderRadius:8,cursor:'pointer',transition:'all .15s',
                    border:'2px solid '+(i===imgIdx?'#0EBAC7':'transparent'),
                    opacity:i===imgIdx?1:0.55}}/>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Modal de perfil completo do usuário ───────────────────────
function UserDetailModal({ userId, userName, disputeRequestId, onClose }) {
  const [profile,      setProfile]      = React.useState(null);
  const [stats,        setStats]        = React.useState({});
  const [photos,       setPhotos]       = React.useState({ before:[], after:[] });
  const [loading,      setLoading]      = React.useState(true);
  // Warnings
  const [warnings,     setWarnings]     = React.useState([]);
  const [showWarnForm, setShowWarnForm] = React.useState(false);
  const [warnSeverity, setWarnSeverity] = React.useState('leve');
  const [warnReason,   setWarnReason]   = React.useState('');
  const [warnSaving,   setWarnSaving]   = React.useState(false);
  // Ban
  const [banned,       setBanned]       = React.useState(false);
  const [banSaving,    setBanSaving]    = React.useState(false);
  // Dispute history
  const [disputes,     setDisputes]     = React.useState([]);

  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '—';

  React.useEffect(() => {
    if (!userId) return;
    const load = async () => {
      setLoading(true);
      const [profRes, authRes, disputesAsReporter, disputesAsReported, ratingsRes, rentalsRes, photosRes, warningsRes,
             jobsRes, mktRes, qpRes, vacRes, ratingsGivenRes, appRes] = await Promise.all([
        window.sb.from('profiles').select('*').eq('id', userId).single(),
        window._adminUserAction('get', userId).then(r => r.data || {}).catch(()=>({})),
        window.sb.from('dispute_reports').select('id,listing_name,severity,status,created_at').eq('reporter_id', userId).order('created_at',{ascending:false}),
        window.sb.from('dispute_reports').select('id,listing_name,severity,status,resolution_action,created_at').eq('reported_user_id', userId).order('created_at',{ascending:false}),
        window.sb.from('rental_ratings').select('stars').eq('ratee_id', userId),
        window.sb.from('rental_requests').select('id,status').eq('requester_id', userId),
        disputeRequestId
          ? window.sb.from('rental_photos').select('type,photo_url').eq('request_id', disputeRequestId)
          : Promise.resolve({ data: [] }),
        window.sb.from('user_warnings').select('*').eq('user_id', userId).order('created_at', {ascending:false}),
        // Activity
        window.sb.from('jobs').select('id,status,created_at').eq('user_id', userId),
        window.sb.from('marketplace').select('id,type,status').eq('user_id', userId),
        window.sb.from('quick_pool_jobs').select('id,status,created_at').eq('poster_id', userId),
        window.sb.from('vacations').select('id,status,created_at').eq('user_id', userId),
        window.sb.from('rental_ratings').select('stars').eq('rater_id', userId),
        window.sb.from('quick_pool_applications').select('id,status').eq('applicant_id', userId),
      ]);
      const prof = profRes.data || {};
      const authUser = authRes || {};
      setProfile({
        ...prof,
        email: authUser.email || prof.email || '',
        created_at: prof.created_at || authUser.created_at,
        last_sign_in: authUser.last_sign_in_at,
        phone: prof.phone || authUser.phone || '',
      });
      setBanned(prof.banned || false);
      setWarnings(warningsRes.data || []);
      const allDisputes = [
        ...(disputesAsReported.data||[]).map(d=>({...d,role:'reported'})),
        ...(disputesAsReporter.data||[]).map(d=>({...d,role:'reporter'})),
      ].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
      setDisputes(allDisputes);
      const stars = ratingsRes.data?.map(r=>r.stars)||[];
      const avgStars = stars.length ? (stars.reduce((a,b)=>a+b,0)/stars.length).toFixed(1) : null;
      const starsGiven = ratingsGivenRes.data?.map(r=>r.stars)||[];
      const avgGiven = starsGiven.length ? (starsGiven.reduce((a,b)=>a+b,0)/starsGiven.length).toFixed(1) : null;
      setStats({
        reportedBy:      (disputesAsReporter.data||[]).length,
        reportedAgainst: (disputesAsReported.data||[]).length,
        rentals:         (rentalsRes.data||[]).length,
        avgRating:       avgStars,
        ratingCount:     stars.length,
        avgGiven:        avgGiven,
        ratingsGiven:    starsGiven.length,
        jobsPosted:      (jobsRes.data||[]).length,
        mktSell:         (mktRes.data||[]).filter(m=>m.type==='sell').length,
        mktRent:         (mktRes.data||[]).filter(m=>m.type==='rent').length,
        qpPosted:        (qpRes.data||[]).length,
        qpOpen:          (qpRes.data||[]).filter(q=>q.status==='open').length,
        vacsPosted:      (vacRes.data||[]).length,
        applications:    (appRes.data||[]).length,
      });
      if (photosRes.data) {
        setPhotos({
          before: photosRes.data.filter(p=>p.type==='before').map(p=>p.photo_url),
          after:  photosRes.data.filter(p=>p.type==='after').map(p=>p.photo_url),
        });
      }
      setLoading(false);
    };
    load();
  }, [userId]);

  const warnPtMap = { leve:1, medio:2, grave:5 };

  const addWarning = async () => {
    if (!warnReason.trim()) return;
    setWarnSaving(true);
    await window.sb.from('user_warnings').insert({
      user_id: userId, dispute_id: disputeRequestId||null, reason: warnReason, severity: warnSeverity,
    });
    const { data: fresh } = await window.sb.from('user_warnings').select('*').eq('user_id', userId).order('created_at',{ascending:false});
    const allWarn = fresh || [];
    setWarnings(allWarn);
    // Notificar usuário
    const ptLabel = { leve:'Leve (+1pt)', medio:'Médio (+2pts)', grave:'Grave (+5pts)' };
    window.sb.from('notifications').insert({
      user_id: userId, type: 'warning',
      title: `Você recebeu uma advertência — ${ptLabel[warnSeverity]||warnSeverity}`,
      body: warnReason,
    }).catch(()=>{});
    // Auto-ban se atingir 5 pontos
    const total = allWarn.reduce((s,w)=>s+(warnPtMap[w.severity]||1),0);
    if (total >= 5 && !banned) {
      await window.sb.from('profiles').update({ banned: true, ban_reason: 'Banido automaticamente por acúmulo de advertências.' }).eq('id', userId);
      setBanned(true);
    }
    setShowWarnForm(false); setWarnReason('');
    setWarnSaving(false);
  };

  const toggleBan = async () => {
    const newBan = !banned;
    if (newBan && !confirm(`Banir ${profile?.name||userName}?\nIsso vai bloquear o acesso à conta.`)) return;
    setBanSaving(true);
    await window.sb.from('profiles').update({ banned: newBan, ban_reason: newBan ? 'Banido pelo admin' : null }).eq('id', userId);
    if (newBan) {
      await window.sb.from('user_warnings').insert({ user_id: userId, reason: 'Conta banida pelo admin', severity: 'banned' });
      const { data } = await window.sb.from('user_warnings').select('*').eq('user_id', userId).order('created_at',{ascending:false});
      setWarnings(data||[]);
    }
    setBanned(newBan);
    setBanSaving(false);
  };

  const totalWarnPts = warnings.reduce((s,w)=>s+(warnPtMap[w.severity]||1),0);

  const InfoRow = ({label, value, highlight}) => value ? (
    <div style={{padding:'9px 12px',background:'#0f1117',borderRadius:9,border:'1px solid #1e293b'}}>
      <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>{label}</div>
      <div style={{fontSize:13,fontWeight:500,color:highlight||'#cbd5e1'}}>{value}</div>
    </div>
  ) : null;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,width:'100%',maxWidth:560,border:'1px solid #334155',boxShadow:'0 32px 80px rgba(0,0,0,0.7)',overflow:'hidden'}}>

        {/* Header bar */}
        <div style={{background:'#13161f',padding:'14px 18px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',gap:12}}>
          <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',flex:1}}>👤 Perfil do usuário</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button>
        </div>

        {loading ? (
          <div style={{padding:48,textAlign:'center',color:'#64748b'}}>Carregando...</div>
        ) : (
          <div style={{padding:'20px',maxHeight:'80vh',overflowY:'auto'}}>

            {/* Avatar + name */}
            <div style={{display:'flex',alignItems:'flex-start',gap:16,marginBottom:16}}>
              {/* Photo */}
              <div style={{flexShrink:0}}>
                {(profile?.photo_url || (profile?.photo_urls&&profile.photo_urls[0]))
                  ? <img src={profile.photo_url||profile.photo_urls[0]} alt=""
                      style={{width:82,height:82,borderRadius:14,objectFit:'cover',border:'2px solid #334155',display:'block'}}/>
                  : <div style={{width:82,height:82,borderRadius:14,background:'linear-gradient(135deg,#0EBAC730,#0077B630)',border:'2px solid #0EBAC740',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,fontWeight:800,color:'#0EBAC7'}}>
                      {(profile?.name||userName||'?')[0].toUpperCase()}
                    </div>
                }
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:19,fontWeight:800,color:'#f1f5f9',marginBottom:2}}>{profile?.name || userName || '—'}</div>
                {/* Tier badge */}
                {profile?.tier && (
                  <span style={{display:'inline-block',fontSize:10,fontWeight:800,padding:'2px 9px',borderRadius:999,marginBottom:4,
                    background: profile.tier==='premium'?'#f59e0b25':profile.tier==='pro'?'#6366f125':'#33415525',
                    color: profile.tier==='premium'?'#f59e0b':profile.tier==='pro'?'#818cf8':'#64748b',
                    border: `1px solid ${profile.tier==='premium'?'#f59e0b50':profile.tier==='pro'?'#6366f150':'#33415550'}`,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>
                    {profile.tier==='premium'?'⭐ Premium':profile.tier==='pro'?'🚀 Pro':'Free'}
                  </span>
                )}
                <div style={{fontSize:11,color:'#64748b'}}>Membro desde {fmtDate(profile?.created_at)}</div>
                {profile?.last_sign_in && <div style={{fontSize:11,color:'#475569',marginTop:1}}>Último acesso: {fmtDate(profile.last_sign_in)}</div>}
                {stats.avgRating && (
                  <div style={{fontSize:13,marginTop:4,color:'#f59e0b'}}>
                    {'★'.repeat(Math.round(parseFloat(stats.avgRating)))}{'☆'.repeat(5-Math.round(parseFloat(stats.avgRating)))}
                    <span style={{color:'#94a3b8',marginLeft:6,fontSize:11}}>{stats.avgRating} ({stats.ratingCount} aval.)</span>
                  </div>
                )}
                <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:6}}>
                  {banned && <span style={{fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:999,background:'#ef444430',color:'#ef4444',border:'1px solid #ef444460'}}>🚫 BANIDO</span>}
                  {!banned && totalWarnPts>0 && <span style={{fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:999,background:'#f59e0b20',color:'#f59e0b',border:'1px solid #f59e0b40'}}>⚠️ {totalWarnPts}/5 pts</span>}

                  const sevLabel = isBan?'🚫 Banimento':isSusp?'🔒 Suspensão':isGrave?'⚠️ Grave +5pt':isMedio?'⚠️ Médio +2pt':'⚠️ Leve +1pt';

                </div>

                  const isReported = d.role === 'reported';

                  return (
                    <div key={d.id||i} style={{display:'flex',gap:10,alignItems:'center',padding:'7px 10px',
                      background:'#0f1117',borderRadius:8,border:'1px solid #1e293b',marginBottom:5}}>

                      <span style={{fontSize:10,color:'#475569',flexShrink:0}}>{fmtDate(d.created_at)}</span>
                    </div>

            {/* Admin actions */}
            <div style={{marginBottom:14,display:'flex',flexDirection:'column',gap:8}}>

                🛡 Ações administrativas

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button onClick={()=>setShowWarnForm(!showWarnForm)} style={{
                  height:36,padding:'0 14px',borderRadius:9,border:'1px solid #f59e0b50',

              </div>
              {showWarnForm && (

            {/* Contact actions */}

        )}
      </div>

// ── Modal resolução de disputa ────────────────────────────────
function ResolveDisputeModal({ dispute, onClose, onResolved, showToast }) {
  const [message,    setMessage]    = React.useState('');
  const [action,     setAction]     = React.useState('none');
  const [warnWeight, setWarnWeight] = React.useState('leve');
  const [saving,     setSaving]     = React.useState(false);
  const BASE = 'https://xiszfqghizqzlwyrfjol.supabase.co';

  const actions = [
    { value:'none',    label:'Nenhuma ação',    desc:'Apenas registrar a resolução sem penalidade',    color:'#64748b' },
    { value:'warning', label:'⚠️ Advertência', desc:'Adicionar pontos de advertência ao renter (acúmulo de 5 pts = ban automático)', color:'#f59e0b' },
    { value:'ban',     label:'🚫 Banimento',    desc:'Banir a conta permanentemente — IRREVERSÍVEL',   color:'#ef4444' },
  ];

  const warnWeights = [
    { value:'leve',  label:'Leve',  pts:1, color:'#f59e0b' },
    { value:'medio', label:'Médio', pts:2, color:'#f97316' },
    { value:'grave', label:'Grave', pts:5, color:'#ef4444', note:'ban automático' },
  ];

  const handleConfirm = async () => {
    if (!message.trim()) { alert('Adicione uma mensagem de resolução pública.'); return; }
    if (action === 'ban' && !confirm(`Banir e excluir a conta de "${dispute.reported_name}"?\n\nEssa ação é IRREVERSÍVEL.`)) return;
    setSaving(true);
    try {
      const now = new Date().toISOString();
      // 1. Resolve dispute
      await window.sb.from('dispute_reports').update({
        status: 'resolved', resolution_message: message, resolution_action: action, resolved_at: now,
      }).eq('id', dispute.id);
      // 2. Update rental request status
      if (dispute.rental_request_id) {
        await window.sb.from('rental_requests').update({ status: 'resolved' }).eq('id', dispute.rental_request_id);
      }
      // 3. Create warning record
      if (action === 'warning' || action === 'ban') {
        const sev = action === 'ban' ? 'banned' : warnWeight;
        await window.sb.from('user_warnings').insert({
          user_id: dispute.reported_user_id, dispute_id: dispute.id, reason: message, severity: sev,
        });
      }
      // 4. Ban: delete auth user (via Edge Function admin-user)
      if (action === 'ban') {
        const res = await window._adminUserAction('delete', dispute.reported_user_id);
        if (!res.ok) { throw new Error((res.data && res.data.error) || 'Erro ao banir'); }
      }
      // 5. Auto-ban se acumular >= 5 pontos
      if (action === 'warning') {
        const ptMap = { leve:1, medio:2, grave:5 };
        const { data: allWarn } = await window.sb.from('user_warnings').select('severity').eq('user_id', dispute.reported_user_id);
        const total = (allWarn||[]).reduce((s,w)=>s+(ptMap[w.severity]||1),0);
        if (total >= 5) {
          await window.sb.from('profiles').update({ banned: true, ban_reason: 'Banido automaticamente por acúmulo de advertências.' }).eq('id', dispute.reported_user_id);
        }
      }
      // 6. Notificar o usuário reportado (aqui action/warnWeight/message estão em escopo)
      if (action === 'warning') {
        const wLabel = { leve:'Leve (+1pt)', medio:'Médio (+2pts)', grave:'Grave (+5pts)' };
        window.sb.from('notifications').insert({
          user_id: dispute.reported_user_id, type: 'warning',
          title: `Você recebeu uma advertência — ${wLabel[warnWeight]||warnWeight}`,
          body: message,
        }).catch(()=>{});
      } else if (action === 'ban') {
        window.sb.from('notifications').insert({
          user_id: dispute.reported_user_id, type: 'warning',
          title: 'Sua conta foi banida',
          body: message,
        }).catch(()=>{});
      }
      // Sinaliza para o pai (setWarnings e outros estados ficam no pai)
      onResolved(dispute.id, { status:'resolved', resolution_message:message, resolution_action:action, resolved_at:now });
      showToast(action==='ban'?'🚫 Usuário banido e reclamação resolvida.':action==='warning'?`⚠️ Advertência (${warnWeight}) aplicada e reclamação resolvida.`:'✓ Reclamação resolvida com sucesso.');
      onClose();
    } catch(e) { alert('Erro: '+e.message); }
    finally { setSaving(false); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:3500,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,width:'100%',maxWidth:500,border:'1px solid #334155',boxShadow:'0 32px 80px rgba(0,0,0,0.7)'}}>
        {/* Header */}
        <div style={{background:'#13161f',padding:'14px 18px',borderBottom:'1px solid #1e293b',borderRadius:'20px 20px 0 0',display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:'#f1f5f9'}}>✅ Resolver Reclamação</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:2}}>📋 {dispute.listing_name||'Item de aluguel'} · Renter: {dispute.reported_name||'—'}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:20,lineHeight:1}}>×</button>
        </div>

        <div style={{padding:'18px 20px 20px',display:'flex',flexDirection:'column',gap:16}}>
          {/* Action selection */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>AÇÃO PARA O RENTER</div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {actions.map(a=>(
                <label key={a.value} onClick={()=>setAction(a.value)} style={{
                  display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',
                  background:action===a.value?a.color+'15':'#0f1117',
                  border:`1px solid ${action===a.value?a.color+'60':'#1e293b'}`,transition:'all .15s',
                }}>
                  <div style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${action===a.value?a.color:'#334155'}`,
                    background:action===a.value?a.color:'transparent',flexShrink:0,marginTop:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {action===a.value&&<div style={{width:6,height:6,borderRadius:'50%',background:'#fff'}}/>}
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:action===a.value?a.color:'#cbd5e1'}}>{a.label}</div>
                    <div style={{fontSize:11,color:'#64748b',marginTop:1}}>{a.desc}</div>
                  </div>
                </label>
              ))}
            </div>
            {/* Seletor de peso — só aparece quando "Advertência" está selecionado */}
            {action === 'warning' && (
              <div style={{marginTop:10,padding:'12px',borderRadius:10,background:'#0f1117',border:'1px solid #f59e0b30'}}>
                <div style={{fontSize:10,fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>
                  PESO DA ADVERTÊNCIA
                </div>
                <div style={{display:'flex',gap:7}}>
                  {warnWeights.map(w=>(
                    <button key={w.value} onClick={()=>setWarnWeight(w.value)} style={{
                      flex:1,padding:'8px 6px',borderRadius:8,cursor:'pointer',fontFamily:'inherit',
                      border:`1px solid ${warnWeight===w.value?w.color+'80':'#334155'}`,
                      background:warnWeight===w.value?w.color+'18':'transparent',
                      transition:'all .15s',
                    }}>
                      <div style={{fontSize:13,fontWeight:800,color:warnWeight===w.value?w.color:'#94a3b8'}}>+{w.pts}pt</div>
                      <div style={{fontSize:10,fontWeight:700,color:warnWeight===w.value?w.color:'#64748b',marginTop:2}}>{w.label}</div>
                      {w.note && <div style={{fontSize:9,color:'#ef4444',marginTop:2}}>{w.note}</div>}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Resolution message */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>
              MENSAGEM PÚBLICA <span style={{color:'#ef4444'}}>*</span>
            </div>
            <textarea
              value={message}
              onChange={e=>setMessage(e.target.value)}
              placeholder="Descreva a resolução — essa mensagem será exibida para ambas as partes no app..."
              rows={3}
              style={{width:'100%',background:'#0f1117',border:'1px solid #334155',borderRadius:10,
                color:'#f1f5f9',fontFamily:'inherit',fontSize:13,padding:'10px 12px',
                resize:'vertical',boxSizing:'border-box',outline:'none',lineHeight:1.6}}
            />
            <div style={{fontSize:11,color:'#475569',marginTop:4}}>
              💬 Ambas as partes verão essa mensagem no aplicativo
            </div>
          </div>

          {/* Confirm buttons */}
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button onClick={onClose} style={{flex:1,height:46,borderRadius:12,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
              Cancelar
            </button>
            <button onClick={handleConfirm} disabled={saving||!message.trim()} style={{
              flex:2,height:46,borderRadius:12,border:'none',cursor:message.trim()&&!saving?'pointer':'not-allowed',fontFamily:'inherit',
              fontWeight:700,fontSize:14,color:'#fff',opacity:message.trim()&&!saving?1:0.55,
              background:action==='ban'?'linear-gradient(135deg,#ef4444,#dc2626)':action==='warning'&&warnWeight==='grave'?'linear-gradient(135deg,#ef4444,#dc2626)':action==='warning'&&warnWeight==='medio'?'linear-gradient(135deg,#f97316,#ea580c)':action==='warning'?'linear-gradient(135deg,#f59e0b,#d97706)':'linear-gradient(135deg,#22c55e,#16a34a)',
            }}>
              {saving?'Processando…':action==='ban'?'🚫 Banir e Resolver':action==='warning'?`⚠️ Advertência ${warnWeight} e Resolver`:'✓ Confirmar Resolução'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Modal genérico de detalhes ───────────────────────────────
function QuickViewModal({ title, row, fields, onClose, onViewAuthor }) {
  const fmtDate = d => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : null;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,width:'100%',maxWidth:480,border:'1px solid #334155',boxShadow:'0 32px 80px rgba(0,0,0,0.7)',overflow:'hidden'}}>
        <div style={{background:'#13161f',padding:'14px 18px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,fontWeight:700,fontSize:15,color:'#f1f5f9'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:20,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:'20px',maxHeight:'75vh',overflowY:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
            {fields.map(f => {
              let val = f.render ? f.render(row[f.key], row) : (row[f.key] != null && row[f.key] !== '' ? String(row[f.key]) : null);
              if (f.key==='created_at'||f.key==='updated_at'||f.key==='hired_at') val = fmtDate(row[f.key]);
              if (!val && val !== 0) return null;
              return (
                <div key={f.key} style={{padding:'10px 12px',background:'#0f1117',borderRadius:10,border:'1px solid #1e293b',gridColumn:f.full?'1/-1':undefined}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>{f.label}</div>
                  <div style={{fontSize:13,fontWeight:500,color:'#cbd5e1',lineHeight:1.5}}>{val}</div>
                </div>
              );
            })}
          </div>
          {onViewAuthor && (row.author_id||row.requester_id||row.owner_id) && (
            <button onClick={()=>onViewAuthor(row)} style={{marginTop:4,marginBottom:8,width:'100%',height:40,borderRadius:10,border:'1px solid #0EBAC740',background:'#0EBAC710',color:'#0EBAC7',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
              👤 Ver perfil do autor
            </button>
          )}
          <button onClick={onClose} style={{width:'100%',height:40,borderRadius:10,border:'1px solid #334155',background:'transparent',color:'#64748b',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
            Fechar
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Modal edição de vaga ──────────────────────────────────────
function EditJobModal({ row, onClose, onSave }) {
  const [form, setForm] = React.useState({
    author:      row.author      || '',
    role:        row.role        || '',
    loc:         row.loc         || '',
    contract:    row.contract    || '',
    pay:         row.pay         || '',
    description: row.description || '',
  });
  const [saving, setSaving] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = { style:{width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid #334155',background:'#0f1117',color:'#f1f5f9',fontSize:13,outline:'none',fontFamily:'inherit'} };
  const lbl = t => <label style={{display:'block',fontSize:11,fontWeight:600,color:'#64748b',marginBottom:5,letterSpacing:'.06em',textTransform:'uppercase'}}>{t}</label>;

  const handleSave = async () => {
    setSaving(true);
    const { error } = await window.sb.from('jobs').update(form).eq('id', row.id);
    setSaving(false);
    if (error) { alert('Erro: ' + error.message); return; }
    onSave({...row, ...form});
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',overflowY:'auto'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,padding:'24px 20px',width:'100%',maxWidth:480,border:'1px solid #334155',boxShadow:'0 24px 64px rgba(0,0,0,0.6)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:16,color:'#f1f5f9'}}>✏️ Editar Vaga</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer',lineHeight:1,padding:4}}>{IC.close}</button>
        </div>
        {(row.profiles?.name || row.profiles?.email) && (
          <div style={{background:'#0f1117',borderRadius:8,padding:'8px 12px',marginBottom:14,fontSize:12,color:'#64748b',display:'flex',alignItems:'center',gap:6}}>
            <span style={{color:'#475569'}}>👤 Publicado por:</span>
            <span style={{color:'#94a3b8',fontWeight:600}}>{row.profiles?.name || row.profiles?.email}</span>
            {row.profiles?.email && row.profiles?.name && <span style={{color:'#475569'}}>· {row.profiles.email}</span>}
          </div>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div>{lbl('Empresa')}<input {...inp} value={form.author} onChange={e=>set('author',e.target.value)} placeholder="ex: South Florida Pools Inc."/></div>
          <div>{lbl('Função / Cargo')}<input {...inp} value={form.role} onChange={e=>set('role',e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>{lbl('Localização')}<input {...inp} value={form.loc} onChange={e=>set('loc',e.target.value)}/></div>
            <div>{lbl('Tipo de Contrato')}<input {...inp} value={form.contract} onChange={e=>set('contract',e.target.value)}/></div>
          </div>
          <div>{lbl('Pagamento')}<input {...inp} value={form.pay} onChange={e=>set('pay',e.target.value)} placeholder="Ex: $18/hr"/></div>
          <div>{lbl('Descrição')}<textarea {...inp} value={form.description} onChange={e=>set('description',e.target.value)} rows={3} style={{...inp.style,resize:'vertical',minHeight:72,lineHeight:1.5}}/></div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button onClick={onClose} style={{flex:1,height:44,borderRadius:12,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
          <button onClick={handleSave} disabled={saving} style={{flex:2,height:44,borderRadius:12,border:'none',background:'linear-gradient(135deg,#0EBAC7,#0D7280)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.7:1}}>
            {saving ? 'Salvando…' : 'Salvar Alterações'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── App Admin ─────────────────────────────────────────────────
function AdminApp({ adminUser, onLogout }) {

  const [viewUserModal, setViewUserModal] = React.useState(null); // {userId,userName,disputeRequestId}
  const [resolveModal,  setResolveModal]  = React.useState(null); // dispute object

  const [viewRow,    setViewRow]    = React.useState(null);
  const [rlsOpen,    setRlsOpen]    = React.useState(false);
  const [rentals,    setRentals]    = React.useState([]);
  const [editJob,    setEditJob]    = React.useState(null);

  const [sponsors,   setSponsors]   = React.useState([]);
  const [sponsorForm, setSponsorForm] = React.useState({ company_name:'', headline:'', subtext:'', link_url:'', logo_text:'', logo_url:'', bg_color:'#001f4d', expires_at:'' });
  const [sponsorSaving, setSponsorSaving] = React.useState(false);
  const [sponsorEdit, setSponsorEdit] = React.useState(null);
  const [sponsorLogoUploading, setSponsorLogoUploading] = React.useState(false);
  const [quickPools,    setQuickPools]    = React.useState([]);
  const [qpFilter,      setQpFilter]      = React.useState('active'); // 'active'|'all'
  const [editQP,        setEditQP]        = React.useState(null); // job being edited
  const [openGroups,    setOpenGroups]    = React.useState({work:false, marketplace:false});
  const [flaggedRatings, setFlaggedRatings] = React.useState([]); // suspicious ratings (collusion/manipulation)
  const [repeatedTradePairs, setRepeatedTradePairs] = React.useState([]); // same pair trading "sold" repeatedly
  const [newAccountRaters,   setNewAccountRaters]   = React.useState([]); // brand-new accounts rating fast
  const [antifraudTab, setAntifraudTab] = React.useState('ratings'); // 'ratings'|'pairs'|'newaccounts'
  // User filters
  const [userSearch,    setUserSearch]    = React.useState('');
  const [userDateFrom,  setUserDateFrom]  = React.useState('');
  const [userDateTo,    setUserDateTo]    = React.useState('');
  const [userPhoneFilter, setUserPhoneFilter] = React.useState('all'); // 'all'|'with'|'without'
  const [userStatusFilter, setUserStatusFilter] = React.useState('all'); // 'all'|'active'|'banned'|'pending'|'warnings'

  const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null), 2800); };

  const fetchAll = async () => {
    setLoading(true);
    const [u,j,tc,m,v,d,w,r,sp,qp,fr,rtp,nar] = await Promise.all([
      window.sb.from('profiles').select('*').order('created_at',{ascending:false}),
      window.sb.from('jobs').select('*, profiles(name, email)').order('created_at',{ascending:false}),
      window.sb.from('techs').select('*').order('created_at',{ascending:false}),
      window.sb.from('marketplace').select('*').order('created_at',{ascending:false}),
      window.sb.from('vacations').select('*').order('created_at',{ascending:false}),
      window.sb.from('dispute_reports').select('*').order('created_at',{ascending:false}),
      window.sb.from('user_warnings').select('*').order('created_at',{ascending:false}),
      window.sb.from('rental_requests').select('*').order('created_at',{ascending:false}),
      window.sb.from('sponsored_cards').select('*').order('created_at',{ascending:false}),
      window.sb.from('quick_pool_jobs').select('*').order('created_at',{ascending:false}).limit(200),
      window.sb.from('flagged_ratings').select('*').order('created_at',{ascending:false}),
      window.sb.from('repeated_trade_pairs').select('*').order('trade_count',{ascending:false}),
      window.sb.from('new_account_raters').select('*').order('ratings_given',{ascending:false}),
    ]);
    if(u.data) setUsers(u.data);
    if(j.data) setJobs(j.data);
    if(tc.data) setTechs(tc.data);
    if(m.data) setMarket(m.data);
    if(v.data) setVacs(v.data);
    if(d.data) setDisputes(d.data);
    if(w.data) setWarnings(w.data);
    if(r.data) setRentals(r.data);
    if(sp.data) setSponsors(sp.data);
    if(qp.data) setQuickPools(qp.data);
    if(fr.data) setFlaggedRatings(fr.data);
    if(rtp.data) setRepeatedTradePairs(rtp.data);
    if(nar.data) setNewAccountRaters(nar.data);
    const hiringsCount = j.data?.filter(x=>x.hired_at)?.length??0;
    const pendingRentals = r.data?.filter(x=>x.status==='pending'||x.status==='active')?.length??0;
    setStats({ users:u.data?.length??0, jobs:j.data?.length??0, techs:tc.data?.length??0, market:m.data?.length??0, vacs:v.data?.length??0, disputes:d.data?.filter(x=>x.status==='pending')?.length??0, hirings:hiringsCount, rentals:r.data?.length??0, pendingRentals });
    setLoading(false);
  };
  React.useEffect(()=>{ fetchAll(); },[]);

  const deleteRow = async (table, row) => {
    const isUser = table === 'profiles';
    const msg = isUser
      ? `Excluir a conta de "${row.name||row.email}"?\n\nIsso vai APAGAR a conta completamente — a pessoa perde o acesso imediatamente e não pode mais fazer login. Não pode ser desfeito.`
      : 'Excluir este registro? Não pode ser desfeito.';
    if(!confirm(msg)) return;

    let error = null;

    if (isUser) {
      // Admin Auth API via Edge Function — deleta user + invalida sessões
      const res = await window._adminUserAction('delete', row.id);
      if (!res.ok) {
        error = { message: (res.data && res.data.error) || 'Erro ao excluir conta (status ' + res.status + ')' };
      }
    } else {
      const res = await window.sb.from(table).delete().eq('id', row.id);
      error = res.error;
    }

    if(error){
      if(error.message&&(error.message.includes('RLS')||error.message.includes('policy')||error.message.includes('permission'))){
        setRlsOpen(true);
      } else { showToast('❌ '+error.message,false); }
      return;
    }
    if(table==='marketplace') setMarket(p=>p.filter(r=>r.id!==row.id));
    else if(table==='jobs')   setJobs(p=>p.filter(r=>r.id!==row.id));
    else if(table==='techs')  setTechs(p=>p.filter(r=>r.id!==row.id));
    else if(table==='profiles') setUsers(p=>p.filter(r=>r.id!==row.id));
    else if(table==='vacations') setVacs(p=>p.filter(r=>r.id!==row.id));
    else if(table==='quick_pool_jobs') setQuickPools(p=>p.filter(r=>r.id!==row.id));
    showToast(isUser ? '🗑️ Conta excluída — acesso revogado.' : '🗑️ Excluído.');
  };

  const deleteFlaggedRating = async (row) => {
    if(!confirm(`Excluir esta avaliação de "${row.from_name||'—'}" para "${row.to_name||'—'}"? Não pode ser desfeito.`)) return;
    const { error } = await window.sb.from('ratings').delete().eq('id', row.id);
    if(error){ error.message.includes('RLS')?setRlsOpen(true):showToast('❌ '+error.message,false); return; }
    setFlaggedRatings(p=>p.filter(r=>r.id!==row.id));
    showToast('🗑️ Avaliação excluída.');
  };

  const markAntifraudReviewed = async (signalType, signalKey) => {
    const { error } = await window.sb.from('antifraud_reviewed').insert({
      signal_type: signalType, signal_key: signalKey, reviewed_by: adminUser?.id || null,
    });
    if (error) { showToast('❌ '+error.message, false); return false; }
    return true;
  };

  const dismissFlaggedRating = async (row) => {
    // Persiste no banco — não volta a aparecer depois de recarregar a página.
    const ok = await markAntifraudReviewed('flagged_rating', row.id);
    if (!ok) return;
    setFlaggedRatings(p=>p.filter(r=>r.id!==row.id));
    showToast('✓ Marcado como revisado.');
  };

  const dismissTradePair = async (row) => {
    const key = row.user_a+'|'+row.user_b;
    const ok = await markAntifraudReviewed('trade_pair', key);
    if (!ok) return;
    setRepeatedTradePairs(p=>p.filter(r=>!(r.user_a===row.user_a && r.user_b===row.user_b)));
    showToast('✓ Marcado como revisado.');
  };

  const dismissNewAccountRater = async (row) => {
    const ok = await markAntifraudReviewed('new_account_rater', row.from_id);
    if (!ok) return;
    setNewAccountRaters(p=>p.filter(r=>r.from_id!==row.from_id));
    showToast('✓ Marcado como revisado.');
  };

  const approveMarket = async (row) => {
    const {data,error} = await window.sb.from('marketplace').update({status:'approved'}).eq('id',row.id);
    if(error){ error.message.includes('RLS')?setRlsOpen(true):showToast('❌ '+error.message,false); return; }
    setMarket(p=>p.map(m=>m.id===row.id?{...m,status:'approved'}:m));
    showToast('✓ Anúncio aprovado e publicado!');
    // Notify listing owner — in-app (bell history) + push
    if (row.author_id) {
      const notifTitle = '🎉 Seu anúncio foi aprovado!';
      const notifBody  = `"${row.name||row.type||'Anúncio'}" já está visível no marketplace.`;
      window.sb.from('notifications').insert({
        user_id: row.author_id, type: 'market',
        title: notifTitle,
        body:  notifBody,
        link_id: row.id,
        read: false,
      }).catch(()=>{});
      try {
        await fetch('https://xiszfqghizqzlwyrfjol.supabase.co/functions/v1/send-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window._adminGetTok() || ''}` },
          body: JSON.stringify({
            user_id: row.author_id,
            title: notifTitle,
            body:  notifBody,
            url:   `/#market`,
            notif_type: 'market',
          }),
        });
      } catch(e) {}
    }
  };

  const rejectMarket = async (row) => {
    if(!confirm(`Rejeitar e excluir "${row.name||row.type}"? Não pode ser desfeito.`)) return;
    const {error} = await window.sb.from('marketplace').delete().eq('id',row.id);
    if(error){ showToast('Erro: '+error.message,false); return; }
    setMarket(p=>p.filter(m=>m.id!==row.id));
    if (row.author_id) {
      window.sb.from('notifications').insert({
        user_id: row.author_id, type: 'market',
        title: 'Seu anúncio não foi aprovado',
        body: `"${row.name||row.type||'Seu anúncio'}" foi rejeitado pelo admin. Revise o conteúdo e tente novamente.`,
      }).catch(()=>{});
    }
    showToast('Anúncio rejeitado e autor notificado.');
  };

  const toggleAdmin = async (row) => {
    const newRole = row.role==='admin'?'user':'admin';
    if(!confirm(`${newRole==='admin'?'Promover':'Rebaixar'} ${row.name||row.email}?`)) return;
    const {error} = await window.sb.from('profiles').update({role:newRole}).eq('id',row.id);
    if(error){ showToast('Erro: '+error.message,false); return; }
    showToast(newRole==='admin'?'Promovido a admin.':'Admin removido.');
    fetchAll();
  };

  const toggleVerified = async (row) => {
    const newVal = !row.verified;
    const {error} = await window.sb.from('profiles')
      .update({ verified: newVal, verification_requested: false })
      .eq('id', row.id);
    if(error){ showToast('❌ '+error.message, false); return; }
    setUsers(p => p.map(u => u.id===row.id ? {...u, verified:newVal, verification_requested:false} : u));
    // Notify user of decision
    window.sb.from('notifications').insert({
      user_id: row.id,
      type: newVal ? 'verification_approved' : 'warning',
      title: newVal ? '✅ Identidade verificada!' : 'Verificação removida',
      body: newVal
        ? 'Seu perfil agora exibe o badge verde de identidade verificada. Parabéns!'
        : 'Seu badge de verificação foi removido pelo administrador.',
      read: false,
    }).catch(()=>{});
    showToast(newVal ? '✓ Usuário verificado — badge verde ativado.' : 'Verificação removida.');
  };

  const pendingCount  = market.filter(m=>!m.status||m.status==='pending').length;
  const disputeCount  = disputes.filter(d=>d.status==='pending').length;
  const verifyCount   = users.filter(u=>u.verification_requested && !u.verified).length;
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
  const fmtDateTime = (d) => d ? new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

  const resolveDispute = (row) => { setResolveModal(row); };

  const saveAdminNote = async (disputeId) => {
    const note = editingNote[disputeId] ?? '';
    const { error } = await window.sb.from('dispute_reports').update({ admin_note: note }).eq('id', disputeId);
    if (error) { showToast('❌ '+error.message, false); return; }
    setDisputes(p => p.map(d => d.id===disputeId ? {...d, admin_note: note} : d));
    showToast('✓ Nota salva.');
  };

  const openQPCount = quickPools.filter(j=>j.status==='open'||j.status==='filled').length;

  const navConfig = [
    { type:'item',  id:'dashboard',  label:'Painel',        icon:IC.dash,    badge:0 },
    { type:'item',  id:'users',      label:'Usuários',      icon:IC.users,   badge:verifyCount },
    { type:'group', id:'work',       label:'Work',          icon:IC.jobs,
      items:[
        { id:'jobs',      label:'Vagas',        icon:IC.jobs },
        { id:'hirings',   label:'Contratações', icon:IC.jobs },
        { id:'techs',     label:'Técnicos',     icon:IC.techs },
        { id:'vacations', label:'Férias / Rotas', icon:IC.vac },
      ]
    },
    { type:'group', id:'marketplace', label:'Marketplace',  icon:IC.market,
      items:[
        { id:'market',  label:'Anúncios',  icon:IC.market, badge:pendingCount },
        { id:'rentals', label:'Aluguéis',  icon:IC.market, badge:stats.pendingRentals||0 },
      ]
    },
    { type:'item',  id:'quickpools', label:'Express Pools', icon:IC.bolt,    badge:openQPCount },
    { type:'item',  id:'disputes',   label:'Reclamações',   icon:IC.flag,    badge:disputeCount },
    { type:'item',  id:'ratings',    label:'Antifraude',    icon:IC.star,    badge:flaggedRatings.length+repeatedTradePairs.length+newAccountRaters.length },
    { type:'item',  id:'sponsors',   label:'Patrocinadores',icon:IC.sponsor, badge:0 },
  ];

  const sectionLabels = {
    dashboard:'Painel', users:'Usuários', jobs:'Vagas', hirings:'Contratações', ratings:'Antifraude',
    techs:'Técnicos', vacations:'Férias / Rotas', market:'Marketplace · Anúncios',
    rentals:'Marketplace · Aluguéis', quickpools:'Express Pools',
    disputes:'Reclamações', sponsors:'Patrocinadores',
  };
  const sectionLabel = sectionLabels[section] || section;

  const toggleGroup = (gid) => {
    setOpenGroups(p=>({...p,[gid]:!p[gid]}));
  };
  const goSection = (id, groupId) => {
    setSection(id);
    setNavOpen(false);
    if(groupId) setOpenGroups(p=>({...p,[groupId]:true}));
  };


  // ── Colunas das tabelas ──
  const statusBadge = (v) => (
    <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:999,
      background:v==='approved'?'#22c55e20':'#f59e0b20',
      color:v==='approved'?'#22c55e':'#f59e0b'}}>
      {v==='approved'?'✓ Aprovado':'⏳ Pendente'}
    </span>
  );
  const toggleFeatured = async (row) => {
    const next = !row.featured;
    const { error } = await window.sb.from('marketplace').update({ featured: next }).eq('id', row.id);
    if (error) { showToast('❌ ' + error.message, false); return; }
    setMarket(p => p.map(m => m.id === row.id ? {...m, featured: next} : m));
    showToast(next ? '⭐ Anúncio em destaque!' : '☆ Destaque removido.');
  };

  const mktCols = [
    {key:'featured',    label:'⭐',        render:(v,row)=>(
      <button onClick={e=>{e.stopPropagation();toggleFeatured(row);}} title={v?'Remover destaque':'Colocar em destaque'}
        style={{background:'none',border:'none',cursor:'pointer',padding:'2px 4px',fontSize:16,lineHeight:1,
          filter:v?'none':'grayscale(1) opacity(0.35)',transition:'filter .15s'}}>
        ⭐
      </button>
    )},
    {key:'status',      label:'Status',    render: statusBadge},
    {key:'type',        label:'Tipo',      render: v => v==='sell'?'Venda':v==='rent'?'Aluguel':v==='route'?'Rota':v},
    {key:'name',        label:'Nome / Rota'},
    {key:'cat',         label:'Categoria'},
    {key:'price',       label:'Preço',     render:(v,r)=>r.price_mode==='neg'?'🤝 Neg.':(v?'$'+v:'—')},
    {key:'description', label:'Descrição', render:v=>v?<span style={{color:'#94a3b8',fontSize:11.5}}>{v.slice(0,50)}{v.length>50?'…':''}</span>:<span style={{color:'#334155',fontSize:11}}>—</span>},
    {key:'photo_urls',  label:'Fotos',     render:(v,r)=>{const p=(v&&v.length>0)?v:(r.photo_url?[r.photo_url]:[]);return p.length>0?<span style={{fontSize:11,fontWeight:700,color:'#0EBAC7'}}>📷 {p.length}</span>:<span style={{fontSize:11,color:'#334155'}}>Sem foto</span>;}},
    {key:'author', label:'Autor', render:(v,row)=>(
      <button onClick={()=>setViewUserModal({userId:row.author_id, userName:row.author})}
        style={{background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',
          fontSize:13,fontWeight:600,color:'#0EBAC7',padding:0,textAlign:'left',
          textDecoration:'underline',textDecorationColor:'rgba(14,186,199,0.35)',
          textUnderlineOffset:3,whiteSpace:'nowrap',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',display:'block'}}>
        {v||'—'}
      </button>
    )},
    {key:'created_at',  label:'Publicado', render:fmtDate},
  ];

  return (
    <div style={{display:'flex', minHeight:'100vh'}}>

      {/* ── Sidebar ── */}
      <div className={`nav-overlay${navOpen?' open':''}`} onClick={()=>setNavOpen(false)}/>
      <div className={`admin-sidebar${navOpen?' open':''}`}>
        <div style={{padding:'16px 14px 13px', borderBottom:'1px solid #1e293b20', background:'linear-gradient(135deg,#0a2a6210,#2373c308)', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <img src="/icone-admin.png" alt="PoolGuyX" style={{width:38, height:38, borderRadius:10, flexShrink:0, border:'1px solid #2373c330'}}/>
            <div>
              <div style={{fontWeight:800, fontSize:14, color:'#f1f5f9', letterSpacing:'-0.01em'}}>PoolGuyX</div>
              <div style={{fontSize:10.5, color:'#2373c3', fontWeight:700, marginTop:1, letterSpacing:'.04em', textTransform:'uppercase'}}>Admin Panel</div>
            </div>
          </div>
          <button onClick={()=>setNavOpen(false)} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',display:'none',padding:4,borderRadius:8}} className="sidebar-close">{IC.close}</button>
        </div>
        <nav style={{flex:1, padding:'10px 8px', display:'flex', flexDirection:'column', gap:2, overflowY:'auto'}}>
          {navConfig.map(n => {
            if(n.type==='item') {
              const active = section===n.id;
              return (
                <button key={n.id} onClick={()=>goSection(n.id)} style={{
                  display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10, border:'none',
                  background: active?'#0EBAC715':'transparent',
                  color: active?'#0EBAC7':'#64748b',
                  fontWeight: active?600:500, fontSize:13.5, textAlign:'left', width:'100%',
                  cursor:'pointer', transition:'all .15s',
                }}>
                  {n.icon}
                  <span style={{flex:1}}>{n.label}</span>
                  {n.badge>0 && <span style={{background:'#f59e0b',color:'#000',fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:999,minWidth:18,textAlign:'center'}}>{n.badge}</span>}
                </button>
