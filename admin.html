            // group
            const groupActive = n.items.some(i=>i.id===section);
            const expanded = openGroups[n.id] || groupActive;
            const groupBadge = (n.items||[]).reduce((s,i)=>s+(i.badge||0),0);
            return (
              <div key={n.id}>
                <button onClick={()=>toggleGroup(n.id)} style={{
                  display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10, border:'none',
                  background: groupActive?'#0EBAC708':'transparent',
                  color: groupActive?'#0EBAC7':'#94a3b8',
                  fontWeight:600, fontSize:13, textAlign:'left', width:'100%',
                  cursor:'pointer', transition:'all .15s',
                }}>
                  {n.icon}
                  <span style={{flex:1, letterSpacing:'.02em'}}>{n.label}</span>
                  {groupBadge>0 && <span style={{background:'#f59e0b',color:'#000',fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:999,minWidth:18,textAlign:'center'}}>{groupBadge}</span>}
                  <span style={{transform:expanded?'rotate(90deg)':'rotate(0deg)',transition:'transform .2s',display:'flex',opacity:.5}}>{IC.chevron}</span>
                </button>
                {expanded && (
                  <div style={{marginLeft:12, marginBottom:2, display:'flex', flexDirection:'column', gap:1,
                    borderLeft:'2px solid #1e293b', paddingLeft:8}}>
                    {n.items.map(child=>{
                      const cActive = section===child.id;
                      return (
                        <button key={child.id} onClick={()=>goSection(child.id, n.id)} style={{
                          display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, border:'none',
                          background: cActive?'#0EBAC715':'transparent',
                          color: cActive?'#0EBAC7':'#64748b',
                          fontWeight: cActive?600:400, fontSize:13, textAlign:'left', width:'100%',
                          cursor:'pointer', transition:'all .15s',
                        }}>
                          {child.icon}
                          <span style={{flex:1}}>{child.label}</span>
                          {child.badge>0 && <span style={{background:'#f59e0b',color:'#000',fontSize:10,fontWeight:800,padding:'1px 6px',borderRadius:999,minWidth:18,textAlign:'center'}}>{child.badge}</span>}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </nav>
        <div style={{padding:'10px 8px 16px', borderTop:'1px solid #1e293b'}}>
          <button onClick={fetchAll} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,border:'none',background:'transparent',color:'#64748b',fontSize:13,fontWeight:500,width:'100%',textAlign:'left',transition:'all .15s',cursor:'pointer'}}
            onMouseEnter={e=>e.currentTarget.style.color='#94a3b8'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>
            {IC.refresh} Atualizar dados
          </button>
          <div style={{fontSize:11,color:'#475569',padding:'4px 12px',marginBottom:4,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{adminUser.email}</div>
          <button onClick={onLogout} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,border:'none',background:'transparent',color:'#64748b',fontSize:13,fontWeight:500,width:'100%',textAlign:'left',transition:'all .15s',cursor:'pointer'}}
            onMouseEnter={e=>{e.currentTarget.style.color='#ef4444';e.currentTarget.style.background='rgba(239,68,68,0.08)';}}
            onMouseLeave={e=>{e.currentTarget.style.color='#64748b';e.currentTarget.style.background='transparent';}}>
            {IC.logout} Sair
          </button>
        </div>
      </div>

      {/* ── Área principal ── */}
      <div className="admin-main" style={{marginLeft:220, flex:1, minWidth:0}}>

        {/* Top bar — mobile */}
        <div className="admin-top-bar">
          <button className="hamburger" onClick={()=>setNavOpen(true)}>{IC.menu}</button>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <img src="/icone-admin.png" alt="PX" style={{width:30,height:30,borderRadius:8,border:'1px solid #2373c330'}}/>
            <span style={{fontWeight:700,fontSize:14,color:'#f1f5f9'}}>{sectionLabel}</span>
          </div>
          <button onClick={fetchAll} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',padding:6}}>{IC.refresh}</button>
        </div>

        {/* Conteúdo das seções */}
        <div style={{padding:'28px 28px'}}>

          {/* ── Painel ── */}
          {section==='dashboard' && (
            <div>
              <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Painel</h1>
              <p style={{fontSize:13,color:'#64748b',marginBottom:18}}>Visão geral de toda atividade no PoolGuyX.</p>

              {pendingCount>0 && (
                <div onClick={()=>goSection('market')} style={{background:'#f59e0b18',border:'1px solid #f59e0b40',borderRadius:14,padding:'13px 16px',marginBottom:20,cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'background .15s'}}>
                  <div style={{width:38,height:38,borderRadius:10,background:'#f59e0b20',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>⏳</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13.5,color:'#f59e0b'}}>{pendingCount} anúncio{pendingCount>1?'s':''} aguardando aprovação</div>
                    <div style={{fontSize:12,color:'#94a3b8',marginTop:1}}>Toque para revisar e aprovar ou rejeitar</div>
                  </div>
                  <div style={{fontSize:18,color:'#f59e0b',opacity:0.7}}>→</div>
                </div>
              )}

              <div className="stat-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:12,marginBottom:24}}>
                <StatCard label="Total de Usuários"  value={stats.users}    color="#0EBAC7" icon={IC.users}  onClick={()=>goSection('users')}/>
                <StatCard label="Vagas"              value={stats.jobs}     color="#6366f1" icon={IC.jobs}   onClick={()=>goSection('jobs','work')}/>
                <StatCard label="Contratações"       value={stats.hirings}  color="#22c55e" icon={IC.jobs}   onClick={()=>goSection('hirings','work')}/>
                <StatCard label="Técnicos"           value={stats.techs}    color="#10b981" icon={IC.techs}  onClick={()=>goSection('techs','work')}/>
                <StatCard label="Marketplace"        value={stats.market}   color="#f59e0b" icon={IC.market} onClick={()=>goSection('market','marketplace')}/>
                <StatCard label="Rotas de Férias"    value={stats.vacs}     color="#ec4899" icon={IC.vac}    onClick={()=>goSection('vacations','work')}/>
                <StatCard label="Aluguéis"           value={stats.rentals}  color="#8b5cf6" icon={IC.market} onClick={()=>goSection('rentals','marketplace')}/>
                <StatCard label="Reclamações Pend."  value={stats.disputes} color="#ef4444" icon={IC.flag}   onClick={()=>goSection('disputes')}/>
              </div>

              <div style={{background:'#1a1f2e',borderRadius:14,padding:'18px 20px',border:'1px solid #1e293b'}}>
                <div style={{fontWeight:600,fontSize:14,color:'#f1f5f9',marginBottom:3}}>Usuários Recentes</div>
                <div style={{fontSize:12,color:'#64748b',marginBottom:14}}>Últimos 5 cadastros — clique para ver o perfil</div>
                {users.slice(0,5).map(u=>(
                  <div key={u.id} onClick={()=>setViewUserModal({userId:u.id,userName:u.name})}
                    style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 10px',borderRadius:10,marginBottom:2,
                      cursor:'pointer',transition:'background .13s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#232a3b'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0,flex:1}}>
                      {u.photo_url
                        ? <img src={u.photo_url} alt="" style={{width:36,height:36,borderRadius:10,objectFit:'cover',flexShrink:0,border:'1px solid #334155'}}/>
                        : <div style={{width:36,height:36,borderRadius:10,background:'#0EBAC715',border:'1px solid #0EBAC730',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#0EBAC7',flexShrink:0}}>
                            {(u.name||u.email||'?')[0].toUpperCase()}
                          </div>
                      }
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:13,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name||'—'}</div>
                        <div style={{fontSize:11,color:'#64748b'}}>{u.email||u.region||'Sem região'} · {fmtDate(u.created_at)}</div>
                      </div>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:999,background:u.role==='admin'?'#0EBAC720':'#1e293b',color:u.role==='admin'?'#0EBAC7':'#475569',flexShrink:0,marginLeft:8}}>{u.role}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Usuários ── */}
          {section==='users' && (() => {
            // ── Apply filters ──
            const warnedIds = new Set(warnings.map(w=>w.user_id));
            const filteredUsers = users.filter(u => {
              const q = userSearch.trim().toLowerCase();
              if (q && !((u.name||'').toLowerCase().includes(q)) && !((u.email||'').toLowerCase().includes(q)) && !((u.phone||'').includes(q))) return false;
              if (userDateFrom && u.created_at && new Date(u.created_at) < new Date(userDateFrom)) return false;
              if (userDateTo   && u.created_at && new Date(u.created_at) > new Date(userDateTo+'T23:59:59')) return false;
              if (userPhoneFilter==='with'    && !u.phone) return false;
              if (userPhoneFilter==='without' && u.phone)  return false;
              if (userStatusFilter==='banned'   && !u.banned) return false;
              if (userStatusFilter==='active'   && (u.banned||u.verification_requested)) return false;
              if (userStatusFilter==='pending'  && !(u.verification_requested&&!u.verified)) return false;
              if (userStatusFilter==='warnings' && !warnedIds.has(u.id)) return false;
              return true;
            });

            const hasFilters = userSearch||userDateFrom||userDateTo||userPhoneFilter!=='all'||userStatusFilter!=='all';
            const clearFilters = () => { setUserSearch(''); setUserDateFrom(''); setUserDateTo(''); setUserPhoneFilter('all'); setUserStatusFilter('all'); };
            const inpS = {background:'#0f1117',border:'1px solid #1e293b',borderRadius:9,padding:'8px 12px',color:'#e2e8f0',fontSize:13,fontFamily:'inherit',outline:'none'};
            const pill = (active,color='#0EBAC7') => ({padding:'6px 13px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:600,transition:'all .15s',
              background:active?color+'22':'#1a1f2e', color:active?color:'#64748b',
              outline:active?`1.5px solid ${color}55`:'1.5px solid #1e293b'});

            return (
              <div>
                <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:4,flexWrap:'wrap'}}>
                  <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9'}}>
                    Usuários <span style={{fontSize:13,color:'#64748b',fontWeight:400}}>({filteredUsers.length}{hasFilters?' de '+users.length:''})</span>
                  </h1>
                  {verifyCount > 0 && <span style={{fontSize:12,fontWeight:700,padding:'2px 10px',borderRadius:999,background:'rgba(245,158,11,0.2)',color:'#F59E0B',border:'1px solid rgba(245,158,11,0.4)'}}>{verifyCount} verificação{verifyCount!==1?'ões':''} pendente{verifyCount!==1?'s':''}</span>}
                </div>
                <p style={{fontSize:13,color:'#64748b',marginBottom:16}}>Todas as contas cadastradas. Clique em ✓ Verificar para ativar o badge verde de identidade verificada.</p>

                {/* ── Filtros ── */}
                <div style={{background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b',padding:'14px 16px',marginBottom:16,display:'flex',flexDirection:'column',gap:12}}>
                  {/* Linha 1: busca + datas */}
                  <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                    <div style={{position:'relative',flex:'2',minWidth:200}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                      <input value={userSearch} onChange={e=>setUserSearch(e.target.value)}
                        placeholder="Buscar por nome, e-mail ou telefone…"
                        style={{...inpS,width:'100%',paddingLeft:32,boxSizing:'border-box'}}/>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                      <span style={{fontSize:11,color:'#475569',fontWeight:600,whiteSpace:'nowrap'}}>De:</span>
                      <input type="date" value={userDateFrom} onChange={e=>setUserDateFrom(e.target.value)} style={{...inpS,colorScheme:'dark',width:140}}/>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                      <span style={{fontSize:11,color:'#475569',fontWeight:600,whiteSpace:'nowrap'}}>Até:</span>
                      <input type="date" value={userDateTo} onChange={e=>setUserDateTo(e.target.value)} style={{...inpS,colorScheme:'dark',width:140}}/>
                    </div>
                    {hasFilters && (
                      <button onClick={clearFilters} style={{padding:'7px 13px',borderRadius:8,border:'1px solid #334155',background:'transparent',color:'#64748b',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                        ✕ Limpar
                      </button>
                    )}
                  </div>
                  {/* Linha 2: status + telefone */}
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:11,color:'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginRight:2}}>Status:</span>
                    {[
                      {id:'all',      label:'Todos',       color:'#0EBAC7'},
                      {id:'active',   label:'✓ Ativos',    color:'#22c55e'},
                      {id:'banned',   label:'🚫 Banidos',  color:'#ef4444'},
                      {id:'pending',  label:'⏳ Pendentes', color:'#f59e0b'},
                      {id:'warnings', label:'⚠️ Com avisos',color:'#f97316'},
                    ].map(f=>(
                      <button key={f.id} onClick={()=>setUserStatusFilter(f.id)} style={pill(userStatusFilter===f.id,f.color)}>{f.label}</button>
                    ))}

            const deleteListing = async (row) => {

              if(error){showToast('❌ '+error.message,false);return;}

                        {id:'active',    label:`Em andamento (${activeReqs.length})`, color:'#f59e0b'},

                        <button key={f.id} onClick={()=>setReqFilter(f.id)} style={{
                          ...inp,
                          background:reqFilter===f.id?f.color+'22':'#1a1f2e',
                          color:reqFilter===f.id?f.color:'#64748b',
                          outline:reqFilter===f.id?`1.5px solid ${f.color}55`:'1.5px solid #1e293b',

                      ))}

                    {visibleReqs.length===0 ? (

                                          <button onClick={()=>r.requester_id&&setViewUserModal({userId:r.requester_id,userName:r.requester_name})}

                                            {r.requester_name}

                                        </div>
                                      )}
                                      {(r.owner_name||r.lister_name)&&(
                                        <div style={{padding:'6px 10px',background:'#0f1117',borderRadius:8,border:'1px solid #1e293b'}}>
                                          <div style={{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>Proprietário</div>
                                          <button onClick={()=>{const uid=r.owner_id||r.lister_id;const uname=r.owner_name||r.lister_name;if(uid)setViewUserModal({userId:uid,userName:uname});}}

                                            {r.owner_name||r.lister_name}

                                          <div style={{fontSize:12,color:'#94a3b8'}}>{r.period}</div>
                                        </div>
                                      )}
                                      {r.message&&(
                                        <div style={{padding:'6px 10px',background:'#0f1117',borderRadius:8,border:'1px solid #1e293b',gridColumn:'1/-1'}}>

                    )}
                  </div>
                )}
              </div>

          }, {market, rentals, setRentals, setMarket, setViewUserModal, showToast, loading, approveMarket, deleteRow})}

          {/* ── Reclamações ── */}

            const sevColor = { minor:'#EAB308', serious:'#F59E0B', critical:'#EF4444' };
            const sevLabel = { minor:'🟡 Leve', serious:'🟠 Sério', critical:'🔴 Crítico' };
            const stColor  = { pending:'#F59E0B', resolved:'#22c55e' };
            const guideText = {
              minor:    '💡 Resolução sugerida: Entre em contato com as partes por e-mail/telefone e ouça os dois lados. Geralmente resolvido com conversa.',
              serious:  '⚠️ Resolução sugerida: Solicite fotos de evidência às partes. Se confirmado dano, aplique aviso ao renter. Reincidência = banimento.',
              critical: '🚨 Resolução sugerida: Item não devolvido é crime (apropriação indébita). Colete prints do chat, fotos antes/depois e ID. Considere banimento imediato e oriente o proprietário a registrar B.O.',
            };
            const pendingDisputes  = disputes.filter(d => d.status === 'pending');
            const resolvedDisputes = disputes.filter(d => d.status !== 'pending');
            const visibleDisputes  = disputeTab === 'pending' ? pendingDisputes : resolvedDisputes;
            return (
              <div>
                <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>

                <div style={{display:'flex',gap:6,marginBottom:20}}>
                  {[
                    { id:'pending',  label:'Pendentes',  count: pendingDisputes.length,  color:'#F59E0B' },

                      padding:'7px 16px', borderRadius:10, border:'none', cursor:'pointer',

                      color: disputeTab===tab.id ? tab.color : '#64748b',

                {visibleDisputes.length === 0 && !loading && (
                  <div style={{padding:48,textAlign:'center',color:'#475569',background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b'}}>
                    <div style={{fontSize:32,marginBottom:8}}>{disputeTab==='pending'?'✅':'📂'}</div>
                    <div style={{fontWeight:600}}>

                    const isPending = d.status === 'pending';
                    const noteVal = editingNote[d.id] ?? (d.admin_note || '');
                    const reportedWarnPts = warnings.filter(w=>w.user_id===d.reported_user_id).reduce((s,w)=>s+({leve:1,medio:2,grave:5,warning:1,suspension:3,banned:5}[w.severity]||1),0);

                        background:'#1a1f2e',borderRadius:16,

                        <div style={{height:3,background:isPending?sevColor[d.severity]:'#1e293b'}}/>
                        <div style={{padding:'16px 18px'}}>

                          {/* Header row */}
                          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:10}}>
                            <span style={{fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999,
                              background:sevColor[d.severity]+'20',color:sevColor[d.severity],border:'1px solid '+sevColor[d.severity]+'40'}}>
                              {sevLabel[d.severity]||d.severity}
                            </span>
                            <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:999,
                              background:(stColor[d.status]||'#64748b')+'20',color:stColor[d.status]||'#64748b',
                              border:'1px solid '+(stColor[d.status]||'#334155')+'40'}}>
                              {d.status==='pending'?'⏳ Pendente':'✓ Resolvido'}
                            </span>
                            <span style={{fontSize:11,color:'#475569',marginLeft:'auto'}}>{fmtDateTime(d.created_at)}</span>
                          </div>

                          {/* Listing */}
                          <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:10}}>

                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>

                              <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>👤 Proprietário (reportou)</div>
                              <div style={{fontSize:13,fontWeight:700,color:'#0EBAC7'}}>{d.reporter_name||'—'}</div>
                              <div style={{fontSize:10,color:'#475569',marginTop:2}}>Clique para ver perfil</div>
                            </button>
                            <button onClick={()=>setViewUserModal({userId:d.reported_user_id,userName:d.reported_name,disputeRequestId:d.rental_request_id})}

                              onMouseEnter={e=>e.currentTarget.style.borderColor='#ef4444'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e293b'}>

                              <div style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{d.reported_name||'—'}</div>
                              {reportedWarnPts > 0 && (
                                <div style={{fontSize:10,fontWeight:700,color:reportedWarnPts>=5?'#ef4444':'#f97316',marginTop:3,padding:'1px 7px',borderRadius:999,
                                  background:reportedWarnPts>=5?'#ef444415':'#f9741615',border:`1px solid ${reportedWarnPts>=5?'#ef444430':'#f9741630'}`,display:'inline-block'}}>

                              <div style={{fontSize:10,color:'#475569',marginTop:2}}>Clique para ver perfil</div>

                                📎 PROVAS ENVIADAS ({d.evidence_urls.length} foto{d.evidence_urls.length!==1?'s':''})

                              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                                {d.evidence_urls.map((url,i)=>(
                                  <a key={i} href={url} target="_blank" rel="noreferrer">
                                    <img src={url} alt={`Prova ${i+1}`} style={{
                                      width:90,height:90,objectFit:'cover',borderRadius:10,
                                      border:'2px solid #3B82F650',cursor:'pointer',
                                      transition:'border-color .15s',
                                    }}
                                    onMouseEnter={e=>e.currentTarget.style.borderColor='#3B82F6'}
                                    onMouseLeave={e=>e.currentTarget.style.borderColor='#3B82F650'}/>

                                ))}
                              </div>
                            </div>
                          )}

                          {/* Resolution guide */}
                          {isPending && (
                            <div style={{background:`rgba(${d.severity==='critical'?'239,68,68':d.severity==='serious'?'245,158,11':'234,179,8'},0.06)`,

                              border:`1px solid rgba(${d.severity==='critical'?'239,68,68':d.severity==='serious'?'245,158,11':'234,179,8'},0.2)`,
                              fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
                              {guideText[d.severity]||guideText.serious}
                            </div>
                          )}

                          {/* Admin note */}
                          <div style={{marginBottom:12}}>
                            <div style={{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>📝 Nota interna (admin)</div>

                              value={noteVal}
                              onChange={e=>setEditingNote(prev=>({...prev,[d.id]:e.target.value}))}

                              style={{width:'100%',background:'#0f1117',border:'1px solid #1e293b',borderRadius:9,
                                color:'#cbd5e1',fontFamily:'inherit',fontSize:12.5,padding:'9px 11px',
                                resize:'vertical',boxSizing:'border-box',outline:'none',lineHeight:1.5}}

                              <button onClick={()=>saveAdminNote(d.id)}
                                style={{marginTop:5,padding:'5px 14px',borderRadius:8,border:'none',cursor:'pointer',

                                💾 Salvar nota
                              </button>
                            )}
                          </div>

                          {/* Actions */}
                          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-start'}}>

                                ✅ Resolver...

                              <div style={{flex:1}}>
                                <div style={{fontSize:11,color:'#22c55e',fontWeight:600,marginBottom:4}}>

                                    <span style={{marginLeft:8,fontSize:10,fontWeight:700,padding:'1px 8px',borderRadius:999,

                                      color:d.resolution_action==='ban'?'#ef4444':d.resolution_action==='suspension'?'#f97316':'#f59e0b',
                                      border:`1px solid ${d.resolution_action==='ban'?'#ef444440':d.resolution_action==='suspension'?'#f9741640':'#f59e0b40'}`}}>
                                      {d.resolution_action==='ban'?'🚫 Conta banida':d.resolution_action==='suspension'?'🔒 Suspensão':'⚠️ Aviso'}

                                  )}
                                </div>

                                  <div style={{fontSize:12,color:'#94a3b8',padding:'8px 10px',background:'#0f1117',

                                    📢 "{d.resolution_message}"
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );

            const reasonMeta = {
              mutual_high:       { label:'🤝 Elogio mútuo (ambos ≥4★)',        color:'#F59E0B' },
              mutual_low:        { label:'⚔️ Ataque mútuo (ambos ≤2★)',        color:'#EF4444' },
              fast_reciprocal:   { label:'⚡ Recíproca rápida (<2h)',           color:'#8B5CF6' },
              new_account_rater: { label:'🆕 Conta nova avaliando (<24h)',      color:'#0EBAC7' },
            };
            const tabs = [
              { id:'ratings',     label:'Avaliações suspeitas', count:flaggedRatings.length },
              { id:'pairs',       label:'Pares recorrentes',    count:repeatedTradePairs.length },
              { id:'newaccounts', label:'Contas novas',         count:newAccountRaters.length },

            <div>
              <h1 style={{fontSize:20,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Antifraude</h1>

                Sinais de manipulação de reputação: avaliações mútuas combinadas, o mesmo par revendendo entre si repetidamente, e contas novas avaliando com velocidade suspeita. Isso não significa que é fraude — revise antes de agir.
              </p>

              {/* Tabs */}
              <div style={{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}}>
                {tabs.map(tab => (
                  <button key={tab.id} onClick={()=>setAntifraudTab(tab.id)} style={{
                    padding:'7px 16px', borderRadius:10, border:'none', cursor:'pointer',
                    fontFamily:'inherit', fontSize:13, fontWeight:700, transition:'all .15s',
                    background: antifraudTab===tab.id ? '#0EBAC722' : '#1a1f2e',
                    color: antifraudTab===tab.id ? '#0EBAC7' : '#64748b',
                    outline: antifraudTab===tab.id ? '1.5px solid #0EBAC755' : '1.5px solid #1e293b',
                    display:'flex', alignItems:'center', gap:7,
                  }}>
                    {tab.label}
                    <span style={{
                      fontSize:11, fontWeight:800, padding:'1px 7px', borderRadius:999,
                      background: antifraudTab===tab.id ? '#0EBAC733' : '#0f1117',
                      color: antifraudTab===tab.id ? '#0EBAC7' : '#475569',
                    }}>{tab.count}</span>
                  </button>
                ))}
              </div>

              {/* ── Aba: Avaliações suspeitas ── */}
              {antifraudTab==='ratings' && (<>
                {flaggedRatings.length === 0 && !loading && (
                  <div style={{padding:48,textAlign:'center',color:'#475569',background:'#1a1f2e',borderRadius:14,border:'1px solid #1e293b'}}>
                    <div style={{fontSize:32,marginBottom:8}}>✅</div>
                    <div style={{fontWeight:600}}>Nenhuma avaliação suspeita no momento.</div>
                  </div>
                )}

                  {flaggedRatings.map(r => (
                    <div key={r.id} style={{background:'#1a1f2e',borderRadius:16,border:'1px solid #1e293b',overflow:'hidden'}}>
                      <div style={{padding:'16px 18px'}}>
                        {/* Reason badges */}
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
                          {(r.reasons||[]).map(reason => {
                            const m = reasonMeta[reason] || { label:reason, color:'#64748b' };
                            return (
                              <span key={reason} style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:999,
                                background:m.color+'20',color:m.color,border:'1px solid '+m.color+'40'}}>
                                {m.label}
                              </span>
                            );
                          })}
                          <span style={{fontSize:11,color:'#475569',marginLeft:'auto'}}>{fmtDateTime(r.created_at)}</span>

      {viewVac && <QuickViewModal title="Detalhes da Rota de Férias" row={viewVac} onClose={()=>setViewVac(null)}
        fields={[
          {key:'month_idx',  label:'Mês', render:(v,r)=>{const m=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return(m[v]||v)+' '+(r.year||'');}},
          {key:'region',     label:'Região'},
          {key:'clients',    label:'Qtd. Piscinas'},
          {key:'price',      label:'Preço'},
          {key:'price_mode', label:'Modo de Preço'},
          {key:'contact',    label:'Contato'},
          {key:'author',     label:'Autor'},
          {key:'notes',      label:'Observações', full:true},
          {key:'created_at', label:'Publicado'},
        ]}
      />}

      {/* ── Modal resolução de disputa ── */}
      {resolveModal && (
        <ResolveDisputeModal
          dispute={resolveModal}
          onClose={()=>setResolveModal(null)}
          showToast={showToast}
          onResolved={(id, updated) => {
            setDisputes(p => p.map(d => d.id===id ? {...d,...updated} : d));
            // Refresh warnings list — setWarnings is in scope here (parent state)
            if (updated.resolution_action && updated.resolution_action !== 'none') {
              window.sb.from('user_warnings').select('*').order('created_at',{ascending:false})
                .then(({data}) => { if(data) setWarnings(data); });
            }
            // Notification is now sent inside ResolveDisputeModal.handleConfirm
            if (updated.resolution_action === 'ban') {
              setUsers(p => p.filter(u => u.id !== resolveModal.reported_user_id));
            }
          }}
        />
      )}

      {/* ── Modal perfil usuário (reclamações) ── */}
      {viewUserModal && (
        <UserDetailModal
          userId={viewUserModal.userId}
          userName={viewUserModal.userName}
          disputeRequestId={viewUserModal.disputeRequestId}
          onClose={()=>setViewUserModal(null)}
        />
      )}

      {/* ── Modal View ── */}
      {viewRow && <ViewMarketModal row={viewRow} onClose={()=>setViewRow(null)} onApprove={approveMarket} onReject={rejectMarket}
        onDelete={row=>{deleteRow('marketplace',row);setMarket(p=>p.filter(m=>m.id!==row.id));}}
        onViewAuthor={r=>setViewUserModal({userId:r.author_id, userName:r.author})}/>}

      {/* ── Modal Edit ── */}
      {editRow && <EditMarketModal row={editRow} onClose={()=>setEditRow(null)} onSave={(updated)=>{setMarket(p=>p.map(m=>m.id===updated.id?updated:m));setEditRow(null);showToast('✓ Anúncio atualizado!');}}/>}

      {/* ── Toast ── */}
      {toast && (
        <div style={{position:'fixed',bottom:24,right:20,left:20,maxWidth:360,margin:'0 auto',padding:'12px 18px',borderRadius:12,background:toast.ok?'#0EBAC7':'#ef4444',color:'#fff',fontWeight:600,fontSize:13.5,boxShadow:'0 8px 24px rgba(0,0,0,0.4)',zIndex:999,textAlign:'center'}}>
          {toast.msg}
        </div>
      )}

      {/* ── Modal RLS ── */}
      {rlsOpen && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setRlsOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,padding:'24px 20px',maxWidth:540,width:'100%',border:'1px solid #334155',boxShadow:'0 24px 64px rgba(0,0,0,0.6)',maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
              <div style={{fontSize:24}}>🔒</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:'#f1f5f9'}}>RLS do Supabase está bloqueando</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:2}}>Execute este SQL no Supabase → SQL Editor:</div>
              </div>
            </div>
            <pre style={{background:'#0f1117',borderRadius:10,padding:'12px 14px',fontSize:11.5,color:'#7dd3fc',overflowX:'auto',lineHeight:1.7,border:'1px solid #1e293b',margin:'0 0 16px'}}>{`-- Dispute reports & Rental requests (admin resolve)
DROP POLICY IF EXISTS "Admins can update dispute_reports" ON dispute_reports;
DROP POLICY IF EXISTS "Admins can update rental_requests" ON rental_requests;
CREATE POLICY "Admins can update dispute_reports" ON dispute_reports FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin'));
CREATE POLICY "Admins can update rental_requests" ON rental_requests FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin'));
-- User warnings (admin manage)
DROP POLICY IF EXISTS "Admins manage warnings" ON user_warnings;
CREATE POLICY "Admins manage warnings" ON user_warnings FOR ALL
USING (EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin'));
-- Marketplace
DROP POLICY IF EXISTS "Admins can update marketplace" ON marketplace;
DROP POLICY IF EXISTS "Admins can delete marketplace" ON marketplace;
DROP POLICY IF EXISTS "Authors can delete own marketplace" ON marketplace;
DROP POLICY IF EXISTS "Authors can update own marketplace" ON marketplace;
CREATE POLICY "Admins can update marketplace" ON marketplace FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete marketplace" ON marketplace FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Authors can delete own marketplace" ON marketplace FOR DELETE
USING (auth.uid() = author_id);
CREATE POLICY "Authors can update own marketplace" ON marketplace FOR UPDATE
USING (auth.uid() = author_id) WITH CHECK (auth.uid() = author_id);
-- Jobs / Techs / Vacations
DROP POLICY IF EXISTS "Admins can delete jobs" ON jobs;
DROP POLICY IF EXISTS "Admins can delete techs" ON techs;
DROP POLICY IF EXISTS "Admins can delete vacations" ON vacations;
CREATE POLICY "Admins can delete jobs" ON jobs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete techs" ON techs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
CREATE POLICY "Admins can delete vacations" ON vacations FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));
-- Profiles (usuarios)
DROP POLICY IF EXISTS "Admins can delete profiles" ON profiles;
DROP POLICY IF EXISTS "Admins can update any profile" ON profiles;
CREATE POLICY "Admins can delete profiles" ON profiles FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'));
CREATE POLICY "Admins can update any profile" ON profiles FOR UPDATE
USING (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'))
WITH CHECK (EXISTS (SELECT 1 FROM profiles p2 WHERE p2.id = auth.uid() AND p2.role = 'admin'));`}</pre>
            <button onClick={()=>setRlsOpen(false)} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'#0EBAC7',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>
              Entendido — vou executar o SQL
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────
function Root() {
  const [adminUser, setAdminUser] = React.useState(null);
  const [checking,  setChecking]  = React.useState(true);

  React.useEffect(() => {
    if(!window.sb){ setChecking(false); return; }
    window.sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const {data:profile} = await window.sb.from('profiles').select('role').eq('id',session.user.id).single();
        if(profile?.role==='admin') setAdminUser(session.user);
      }
      setChecking(false);
    });
  },[]);

  const handleLogout = async () => { await window.sb.auth.signOut(); setAdminUser(null); };

  if(checking) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1117'}}>
      <div style={{color:'#64748b',fontSize:14}}>Carregando…</div>
    </div>
  );

  if(!adminUser) return <AdminLogin onLogin={(u)=>setAdminUser(u)}/>;
  return <AdminApp adminUser={adminUser} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
