<script>
/* Native fetch Supabase client — same pattern as main app, no external SDK needed */
(function(){
  var BASE = 'https://xiszfqghizqzlwyrfjol.supabase.co';
  var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpc3pmcWdoaXpxemx3eXJmam9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNzM3NDMsImV4cCI6MjA5NTc0OTc0M30.BeRc6j0XnJteUSaA7nAjOWCS_bZ9rcBlGvw54cXcmeg';
  var _tok = null;
  try { var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.t) _tok=s.t; } catch(e){}

  function hdrs(extra){ var h={'apikey':KEY,'Content-Type':'application/json','Authorization':'Bearer '+(_tok||KEY)}; return Object.assign(h,extra||{}); }

  function makeBuilder(table){
    var op='select', sel='*', filters=[], orderCol=null, orderAsc=true, isSingle=false, body=null;
    var run=async function(){
      var url=BASE+'/rest/v1/'+table, h=hdrs();
      if(op==='insert'){
        var r=await fetch(url,{method:'POST',headers:Object.assign({},h,{'Prefer':'return=minimal'}),body:JSON.stringify(body)});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Insert failed '+r.status}};}
        return{data:null,error:null};
      }
      if(op==='update'){
        var qs=filters.join('&');
        // Use return=representation so we can detect 0-row updates (silent RLS block)
        var r=await fetch(url+(qs?'?'+qs:''),{method:'PATCH',headers:Object.assign({},h,{'Prefer':'return=representation'}),body:JSON.stringify(body)});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Update failed '+r.status}};}
        var d=[]; try{d=await r.json();}catch(x){}
        if(!Array.isArray(d)||d.length===0) return{data:null,error:{message:'No rows updated — check Supabase RLS policies for UPDATE on this table.'}};
        return{data:d,error:null};
      }
      if(op==='delete'){
        var qs=filters.join('&');
        var r=await fetch(url+(qs?'?'+qs:''),{method:'DELETE',headers:h});
        if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Delete failed '+r.status}};}
        return{data:null,error:null};
      }
      var p=['select='+encodeURIComponent(sel)];
      filters.forEach(function(f){p.push(f);});
      if(orderCol) p.push('order='+orderCol+(orderAsc?'':'.desc'));
      if(isSingle) h['Accept']='application/vnd.pgrst.object+json';
      var r=await fetch(url+'?'+p.join('&'),{headers:h});
      if(r.status===406||r.status===404) return{data:null,error:null};
      var d=await r.json();
      if(!r.ok) return{data:null,error:{message:d.message||d.hint||'Query failed '+r.status}};
      return{data:d,error:null};
    };
    var b={
      select:function(c){sel=c||'*';return b;},
      eq:function(c,v){filters.push(c+'=eq.'+encodeURIComponent(v));return b;},
      neq:function(c,v){filters.push(c+'=neq.'+encodeURIComponent(v));return b;},
      order:function(c,opts){orderCol=c;orderAsc=opts?opts.ascending!==false:true;return b;},
      single:function(){isSingle=true;return b;},
      insert:function(row){op='insert';body=row;return b;},
      update:function(upd){op='update';body=upd;return b;},
      delete:function(){op='delete';return b;},
      then:function(res,rej){return run().then(res,rej);},
      catch:function(rej){return run().catch(rej);}
    };
    return b;
  }

  window.sb = {
    auth:{
      signInWithPassword:async function(creds){
        var r=await fetch(BASE+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email:creds.email,password:creds.password})});
        var d=await r.json();
        if(!r.ok) return{data:null,error:{message:d.error_description||d.msg||d.message||'Invalid credentials'}};
        _tok=d.access_token;
        try{localStorage.setItem('pg_admin_s',JSON.stringify({t:d.access_token,u:{id:d.user.id,email:d.user.email}}));}catch(e){}
        return{data:{user:d.user,session:d},error:null};
      },
      getSession:async function(){
        try{var s=JSON.parse(localStorage.getItem('pg_admin_s')||'null'); if(s&&s.u) return{data:{session:{user:s.u,access_token:s.t}}};}catch(e){}
        return{data:{session:null}};
      },
      signOut:async function(){
        try{if(_tok) await fetch(BASE+'/auth/v1/logout',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+_tok}});}catch(e){}
        _tok=null; try{localStorage.removeItem('pg_admin_s');}catch(e){}
      }
    },
    from:function(table){return makeBuilder(table);},
  };
  console.log('[AdminPanel] Supabase native fetch ✓ token=', _tok ? 'loaded' : 'none');
})();
</script>

// ── Table ─────────────────────────────────────────────────────
function DataTable({ columns, rows, onDelete, onPromote, onApprove, onReject, onEdit, loading }) {
  if (loading) return <div style={{padding:32, textAlign:'center', color:'#64748b'}}>Loading…</div>;
  if (!rows.length) return <div style={{padding:32, textAlign:'center', color:'#64748b'}}>No records found.</div>;
  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
        <thead>
          <tr style={{borderBottom:'1px solid #1e293b'}}>
            {columns.map(c => (
              <th key={c.key} style={{padding:'10px 14px', textAlign:'left', color:'#64748b', fontWeight:600, fontSize:11, letterSpacing:'0.06em', textTransform:'uppercase', whiteSpace:'nowrap'}}>{c.label}</th>
            ))}
            <th style={{padding:'10px 14px', color:'#64748b', fontWeight:600, fontSize:11, letterSpacing:'0.06em', textTransform:'uppercase'}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={row.id || i} style={{borderBottom:'1px solid #1e293b18', transition:'background .1s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#1e293b50'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              {columns.map(c => (
                <td key={c.key} style={{padding:'10px 14px', color: c.key==='role' ? (row[c.key]==='admin'?'#0EBAC7':'#94a3b8') : '#cbd5e1', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  {c.render ? c.render(row[c.key], row) : (row[c.key] ?? '—')}
                </td>
              ))}
              <td style={{padding:'10px 14px'}}>
                <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                  {onApprove && row.status !== 'approved' && (
                    <button onClick={()=>onApprove(row)} style={{
                      padding:'5px 10px', borderRadius:8, border:'1px solid #22c55e40',
                      background:'#22c55e15', color:'#22c55e',
                      fontSize:11, fontWeight:700, display:'flex', alignItems:'center', gap:4,
                    }}>✓ Approve</button>
                  )}
                  {onReject && row.status !== 'approved' && (
                    <button onClick={()=>onReject(row)} style={{
                      padding:'5px 10px', borderRadius:8, border:'1px solid #f59e0b40',
                      background:'#f59e0b15', color:'#f59e0b',
                      fontSize:11, fontWeight:700, display:'flex', alignItems:'center', gap:4,
                    }}>✗ Reject</button>
                  )}
                  {onPromote && (
                    <button onClick={()=>onPromote(row)} title={row.role==='admin'?'Remove admin':'Make admin'} style={{
                      padding:'5px 10px', borderRadius:8, border:'1px solid',
                      borderColor: row.role==='admin' ? '#334155' : '#0EBAC730',
                      background: row.role==='admin' ? 'transparent' : '#0EBAC710',
                      color: row.role==='admin' ? '#64748b' : '#0EBAC7',
                      fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:4,
                    }}>{icons.shield} {row.role==='admin'?'Demote':'Admin'}</button>
                  )}
                  {onEdit && (
                    <button onClick={()=>onEdit(row)} title="Edit" style={{
                      padding:'5px 10px', borderRadius:8, border:'1px solid #6366f140',
                      background:'#6366f110', color:'#818cf8',
                      fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:4,
                    }}>{icons.edit} Edit</button>

}

// ── Login ─────────────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [email, setEmail] = React.useState('');
  const [pass,  setPass]  = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email || !pass || loading) return;
    setLoading(true); setError('');
    try {
      const { data, error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pass });
      if (err) throw err;
      const { data: profile } = await window.sb.from('profiles').select('role').eq('id', data.user.id).single();
      if (!profile || profile.role !== 'admin') {
        await window.sb.auth.signOut();
        throw new Error('Access denied — admin only.');
      }
      onLogin(data.user, profile);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0f1117'}}>
      <div style={{width:380, background:'#1a1f2e', borderRadius:20, padding:36, border:'1px solid #1e293b', boxShadow:'0 32px 80px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:28}}>
          <div style={{width:44, height:44, borderRadius:12, background:'linear-gradient(135deg,#0EBAC7,#0D7280)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:18}}>PX</div>
          <div>
            <div style={{fontWeight:700, fontSize:18, color:'#f1f5f9'}}>Admin Panel</div>
            <div style={{fontSize:12, color:'#64748b'}}>PoolGuyX — Restricted access</div>
          </div>
        </div>
        <form onSubmit={handleSubmit} style={{display:'flex', flexDirection:'column', gap:14}}>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'0.06em', textTransform:'uppercase'}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#64748b', marginBottom:6, letterSpacing:'0.06em', textTransform:'uppercase'}}>Password</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
              style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1px solid #334155', background:'#0f1117', color:'#f1f5f9', fontSize:14, outline:'none'}}/>
          </div>
          {error && <div style={{fontSize:12.5, color:'#ef4444', background:'#ef44441a', border:'1px solid #ef444430', borderRadius:8, padding:'9px 12px'}}>{error}</div>}
          <button type="submit" disabled={loading} style={{
            height:48, borderRadius:12, border:'none', fontWeight:700, fontSize:15,
            background:'linear-gradient(135deg,#0EBAC7,#0D7280)', color:'#fff',
            boxShadow:'0 6px 20px rgba(14,186,199,0.3)', transition:'opacity .2s',
            opacity: loading ? 0.7 : 1,
          }}>{loading ? 'Signing in…' : 'Sign in'}</button>
        </form>
      </div>
    </div>
  );
}

// ── Edit Modal ────────────────────────────────────────────────
function EditMarketModal({ row, onClose, onSave }) {
  const [form, setForm] = React.useState({
    name:       row.name       || '',
    type:       row.type       || 'sell',
    cat:        row.cat        || '',
    condition:  row.condition  || '',
    price:      row.price      || '',
    price_mode: row.price_mode || 'fixed',
    loc:        row.loc        || '',
    status:     row.status     || 'pending',
    route_name: row.route_name || '',
    area:       row.area       || '',
    asking:     row.asking     || '',
    clients:    row.clients    || '',
    revenue:    row.revenue    || '',
  });
  const [saving, setSaving] = React.useState(false);
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const inp = {
    style:{width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid #334155',
           background:'#0f1117', color:'#f1f5f9', fontSize:13, outline:'none', fontFamily:'inherit'},
  };
  const lbl = (t) => <label style={{display:'block',fontSize:11,fontWeight:600,color:'#64748b',marginBottom:5,letterSpacing:'0.06em',textTransform:'uppercase'}}>{t}</label>;

  const handleSave = async () => {
    setSaving(true);
    const { error } = await window.sb.from('marketplace').update(form).eq('id', row.id);
    setSaving(false);
    if (error) { alert('Error: ' + error.message); return; }
    onSave({...row, ...form});
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#1a1f2e',borderRadius:20,padding:28,width:'100%',maxWidth:560,maxHeight:'90vh',overflowY:'auto',border:'1px solid #334155',boxShadow:'0 24px 64px rgba(0,0,0,0.6)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <div style={{fontWeight:700,fontSize:17,color:'#f1f5f9'}}>✏️ Edit Post</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'1/-1'}}>
            {lbl('Title / Name')}
            <input {...inp} value={form.name} onChange={e=>set('name',e.target.value)}/>
          </div>
          <div>
            {lbl('Type')}
            <select {...inp} value={form.type} onChange={e=>set('type',e.target.value)}>
              <option value="sell">Sell</option>
              <option value="rent">Rent</option>
              <option value="route">Route</option>
            </select>
          </div>
          <div>
            {lbl('Status')}
            <select {...inp} value={form.status} onChange={e=>set('status',e.target.value)}>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
            </select>
          </div>
          <div>
            {lbl('Category')}
            <input {...inp} value={form.cat} onChange={e=>set('cat',e.target.value)} placeholder="Pumps, Vacuum…"/>
          </div>
          <div>
            {lbl('Condition')}
            <input {...inp} value={form.condition} onChange={e=>set('condition',e.target.value)} placeholder="New, Used…"/>
          </div>
          <div>
            {lbl('Price ($)')}
            <input {...inp} type="number" value={form.price} onChange={e=>set('price',e.target.value)}/>
          </div>
          <div>
            {lbl('Price Mode')}
            <select {...inp} value={form.price_mode} onChange={e=>set('price_mode',e.target.value)}>
              <option value="fixed">Fixed</option>
              <option value="neg">Negotiable</option>
            </select>
          </div>
          <div style={{gridColumn:'1/-1'}}>
            {lbl('Location')}
            <input {...inp} value={form.loc} onChange={e=>set('loc',e.target.value)}/>
          </div>
          {form.type === 'route' && <>
            <div style={{gridColumn:'1/-1'}}>
              {lbl('Route Name')}
              <input {...inp} value={form.route_name} onChange={e=>set('route_name',e.target.value)}/>
            </div>
            <div>{lbl('Clients')}<input {...inp} type="number" value={form.clients} onChange={e=>set('clients',e.target.value)}/></div>
            <div>{lbl('Revenue/mo')}<input {...inp} type="number" value={form.revenue} onChange={e=>set('revenue',e.target.value)}/></div>
            <div>{lbl('Asking ($)')}<input {...inp} type="number" value={form.asking} onChange={e=>set('asking',e.target.value)}/></div>
            <div>{lbl('Area')}<input {...inp} value={form.area} onChange={e=>set('area',e.target.value)}/></div>
          </>}
        </div>
        <div style={{display:'flex',gap:10,marginTop:22}}>
          <button onClick={onClose} style={{flex:1,height:44,borderRadius:12,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
          <button onClick={handleSave} disabled={saving} style={{flex:2,height:44,borderRadius:12,border:'none',background:'linear-gradient(135deg,#0EBAC7,#0D7280)',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.7:1}}>
            {saving ? 'Saving…' : 'Save Changes'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Admin App ─────────────────────────────────────────────────
function AdminApp({ adminUser, onLogout }) {
  const [section,    setSection]    = React.useState('dashboard');
  const [stats,      setStats]      = React.useState({});
  const [users,      setUsers]      = React.useState([]);
  const [jobs,       setJobs]       = React.useState([]);
  const [techs,      setTechs]      = React.useState([]);
  const [market,     setMarket]     = React.useState([]);
  const [vacs,       setVacs]       = React.useState([]);
  const [loading,    setLoading]    = React.useState(false);
  const [toast,      setToast]      = React.useState(null);
  const [marketTab,  setMarketTab]  = React.useState('pending'); // 'pending'|'approved'|'all'
  const [editRow,    setEditRow]    = React.useState(null);

  const showToast = (msg, ok=true) => { setToast({msg, ok}); setTimeout(()=>setToast(null), 2500); };

  const fetchAll = async () => {
    setLoading(true);
    const [u, j, tc, m, v] = await Promise.all([
      window.sb.from('profiles').select('*').order('created_at', {ascending:false}),
      window.sb.from('jobs').select('*').order('created_at', {ascending:false}),
      window.sb.from('techs').select('*').order('created_at', {ascending:false}),
      window.sb.from('marketplace').select('*').order('created_at', {ascending:false}),
      window.sb.from('vacations').select('*').order('created_at', {ascending:false}),
    ]);
    if (u.data) setUsers(u.data);
    if (j.data) setJobs(j.data);
    if (tc.data) setTechs(tc.data);
    if (m.data) setMarket(m.data);
    if (v.data) setVacs(v.data);
    setStats({
      users: u.data?.length ?? 0,
      jobs:  j.data?.length ?? 0,
      techs: tc.data?.length ?? 0,
      market:m.data?.length ?? 0,
      vacs:  v.data?.length ?? 0,
    });
    setLoading(false);
  };

  React.useEffect(() => { fetchAll(); }, []);

  const deleteRow = async (table, row) => {
    if (!confirm(`Delete this record? This cannot be undone.`)) return;
    const { error } = await window.sb.from(table).delete().eq('id', row.id);
    if (error) {
      if (error.message && (error.message.includes('RLS') || error.message.includes('policy') || error.message.includes('permission'))) {
        setRlsModalOpen(true);
      } else {
        showToast('❌ ' + error.message, false);
      }
      return;
    }
    // Optimistic update — remove from local state immediately
    if (table === 'marketplace') setMarket(prev => prev.filter(m => m.id !== row.id));
    else if (table === 'jobs')    setJobs(prev  => prev.filter(j => j.id !== row.id));
    else if (table === 'techs')   setTechs(prev => prev.filter(t => t.id !== row.id));
    else if (table === 'profiles')setUsers(prev => prev.filter(u => u.id !== row.id));
    else if (table === 'vacations')setVacs(prev => prev.filter(v => v.id !== row.id));
    showToast('🗑️ Deleted.');
  };

  const [rlsModalOpen, setRlsModalOpen] = React.useState(false);

  const approveMarket = async (row) => {
    console.log('[Admin] Approving id=', row.id);
    const { data, error } = await window.sb.from('marketplace').update({ status: 'approved' }).eq('id', row.id);
    if (error) {
      console.error('[Admin] Approve error:', error);
      if (error.message && error.message.includes('RLS')) {
        setRlsModalOpen(true);
      } else {
        showToast('❌ ' + error.message, false);
      }
      return;
    }
    console.log('[Admin] Approved ok, rows=', data);
    setMarket(prev => prev.map(m => m.id === row.id ? {...m, status:'approved'} : m));
    showToast('✓ Post approved and published!');
  };

  const rejectMarket = async (row) => {
    if (!confirm(`Reject and delete "${row.name || row.type}"? This cannot be undone.`)) return;
    const { error } = await window.sb.from('marketplace').delete().eq('id', row.id);
    if (error) { showToast('Error: ' + error.message, false); return; }
    setMarket(prev => prev.filter(m => m.id !== row.id));
    showToast('Post rejected and removed.');
  };

  const toggleAdmin = async (row) => {
    const newRole = row.role === 'admin' ? 'user' : 'admin';
    if (!confirm(`${newRole === 'admin' ? 'Promote' : 'Demote'} ${row.name || row.email}?`)) return;
    const { error } = await window.sb.from('profiles').update({ role: newRole }).eq('id', row.id);
    if (error) { showToast('Error: ' + error.message, false); return; }
    showToast(newRole === 'admin' ? 'Promoted to admin.' : 'Removed admin.');
    fetchAll();
  };

  const pendingCount = market.filter(m => !m.status || m.status === 'pending').length;

  const navItems = [
    { id:'dashboard', label:'Dashboard', icon:icons.dash },
    { id:'users',     label:'Users',     icon:icons.users },
    { id:'jobs',      label:'Jobs',      icon:icons.jobs },
    { id:'techs',     label:'Techs',     icon:icons.techs },
    { id:'market',    label:'Marketplace',icon:icons.market, badge: pendingCount },
    { id:'vacations', label:'Vacations', icon:icons.vac },

        <div style={{padding:'24px 20px 16px', borderBottom:'1px solid #1e293b'}}>
          <div style={{fontWeight:800, fontSize:16, color:'#f1f5f9'}}>PoolGuyX</div>
          <div style={{fontSize:11, color:'#0EBAC7', fontWeight:600, marginTop:2}}>Admin Panel</div>
        </div>
        <nav style={{flex:1, padding:'12px 10px', display:'flex', flexDirection:'column', gap:2}}>

      {/* Main */}
      <div style={{marginLeft:220, flex:1, padding:'32px 36px', minWidth:0}}>

            {/* Pending approval alert */}
            {pendingCount > 0 && (
              <div onClick={()=>setSection('market')} style={{
                background:'#f59e0b18', border:'1px solid #f59e0b40', borderRadius:14,

            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:16, marginBottom:32}}>

                rows={techs}

                  { key:'specialty',  label:'Specialty' },
                  { key:'loc',        label:'Location' },
                  { key:'phone',      label:'Phone' },
                  { key:'rate',       label:'Rate' },
                  { key:'author',     label:'Author' },
                  { key:'created_at', label:'Posted', render: v => fmtDate(v) },
                ]}
                onDelete={row => deleteRow('techs', row)}
              />

          </div>

        {section === 'market' && (() => {

          const approvedRows = market.filter(m => m.status === 'approved');
          const displayRows  = marketTab === 'pending' ? pendingRows
                             : marketTab === 'approved' ? approvedRows
                             : market;
          const mktCols = [
            { key:'status', label:'Status', render: v => (
              <span style={{

                background: v==='approved' ? '#22c55e20' : '#f59e0b20',

            { key:'type',       label:'Type' },
            { key:'name',       label:'Name / Route' },
            { key:'cat',        label:'Category' },
            { key:'price',      label:'Price' },
            { key:'loc',        label:'Location' },
            { key:'author',     label:'Author' },
            { key:'created_at', label:'Posted', render: v => fmtDate(v) },

                <h1 style={{fontSize:22, fontWeight:700, color:'#f1f5f9'}}>Marketplace</h1>

                  <span style={{background:'#f59e0b', color:'#000', fontSize:11, fontWeight:800, padding:'3px 10px', borderRadius:999}}>

                )}

                    padding:'8px 16px', borderRadius:10, border:'none', cursor:'pointer', fontFamily:'inherit',

                rows={vacs}

      {/* Toast */}
      {toast && (
        <div style={{
          position:'fixed', bottom:28, right:28, padding:'12px 20px', borderRadius:12,

      {/* RLS Fix Modal */}
      {rlsModalOpen && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:1000,
          display:'flex', alignItems:'center', justifyContent:'center', padding:24,

            <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:16}}>
              <div style={{fontSize:28}}>🔒</div>
              <div>
                <div style={{fontWeight:700, fontSize:17, color:'#f1f5f9'}}>Supabase RLS is blocking the update</div>
                <div style={{fontSize:12, color:'#64748b', marginTop:2}}>The approve button works, but the database policy is rejecting it.</div>
              </div>
            </div>
            <div style={{fontSize:13, color:'#94a3b8', marginBottom:14, lineHeight:1.6}}>
              Run this SQL in <strong style={{color:'#f1f5f9'}}>Supabase → SQL Editor</strong>:
            </div>
            <pre style={{
              background:'#0f1117', borderRadius:10, padding:'14px 16px',
              fontSize:12, color:'#7dd3fc', overflowX:'auto', lineHeight:1.7,
              border:'1px solid #1e293b', margin:'0 0 18px',
            }}>{`-- Drop old policies if they exist, then recreate
DROP POLICY IF EXISTS "Admins can update marketplace" ON marketplace;
DROP POLICY IF EXISTS "Admins can delete marketplace" ON marketplace;

CREATE POLICY "Admins can update marketplace"
ON marketplace FOR UPDATE
USING (
  EXISTS (
    SELECT 1 FROM profiles
    WHERE profiles.id = auth.uid()
    AND profiles.role = 'admin'
  )
);

CREATE POLICY "Admins can delete marketplace"
ON marketplace FOR DELETE
USING (
  EXISTS (
    SELECT 1 FROM profiles
    WHERE profiles.id = auth.uid()
    AND profiles.role = 'admin'
  )
);

-- Also allow admins to delete from other tables
DROP POLICY IF EXISTS "Admins can delete jobs" ON jobs;
DROP POLICY IF EXISTS "Admins can delete techs" ON techs;
DROP POLICY IF EXISTS "Admins can delete vacations" ON vacations;

CREATE POLICY "Admins can delete jobs"
ON jobs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));

CREATE POLICY "Admins can delete techs"
ON techs FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));

CREATE POLICY "Admins can delete vacations"
ON vacations FOR DELETE
USING (EXISTS (SELECT 1 FROM profiles WHERE profiles.id = auth.uid() AND profiles.role = 'admin'));`}</pre>
            <div style={{fontSize:12, color:'#64748b', marginBottom:18}}>
              After running the SQL, click Approve again — it will work.
            </div>
            <button onClick={()=>setRlsModalOpen(false)} style={{
              width:'100%', padding:'12px', borderRadius:12, border:'none',
              background:'#0EBAC7', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer',
            }}>Got it — I'll run the SQL</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────
function Root() {
  const [adminUser, setAdminUser] = React.useState(null);
  const [checking,  setChecking]  = React.useState(true);

  React.useEffect(() => {
    if (!window.sb) { setChecking(false); return; }
    window.sb.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data: profile } = await window.sb.from('profiles').select('role').eq('id', session.user.id).single();
        if (profile?.role === 'admin') setAdminUser(session.user);
      }
      setChecking(false);
    });
  }, []);

  const handleLogout = async () => {
    await window.sb.auth.signOut();
    setAdminUser(null);
  };

  if (checking) return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0f1117'}}>
      <div style={{color:'#64748b', fontSize:14}}>Loading…</div>
    </div>
  );

  if (!adminUser) return <AdminLogin onLogin={(u) => setAdminUser(u)} />;
  return <AdminApp adminUser={adminUser} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
