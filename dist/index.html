  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Poppins", -apple-system, system-ui, sans-serif;
      background: var(--pg-bg);
    }
    #stage {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: var(--pg-bg);
      position: relative;
    }
    #stage::after { display: none; }
    #root { width: 100%; height: 100%; }

    /* ── Splash screen — shown instantly before any JS loads ── */
    #pgSplash {
      position: fixed; inset: 0; z-index: 99999;
      background: #040d18;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      transition: opacity 0.4s ease;
    }
    #pgSplash.fade { opacity: 0; pointer-events: none; }

    /* Radial glow behind the icon */
    .pgSplashGlow {
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,216,0.18) 0%, rgba(0,119,182,0.10) 45%, transparent 72%);
      pointer-events: none;
    }

    /* Icon badge */
    .pgSplashIcon {
      width: 150px; height: 150px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      animation: pgSplashPop 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .pgSplashIcon img {
      width: 150px; height: 150px;
      object-fit: contain;
      filter: drop-shadow(0 6px 24px rgba(0,180,216,0.45));
    }

    /* PoolGuyX wordmark */
    .pgSplashWordmark {
      margin-top: -18px;
      position: relative; z-index: 1;
      display: flex; align-items: baseline; gap: 0;
      animation: pgSplashFadeUp 0.5s 0.2s ease both;
    }
    .pgSplashWord {
      font-family: "Raleway", "Poppins", sans-serif;
      font-weight: 800;
      font-size: 32px;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .pgSplashWord em {
      font-style: normal;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    .pgSplashTag {
      margin-top: 6px;
      font-family: "Poppins", sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.32);
      position: relative; z-index: 1;
      animation: pgSplashFadeUp 0.5s 0.35s ease both;
    }

    /* Loading bar */
    .pgSplashBar {
      margin-top: 48px;
      width: 56px; height: 2px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative; z-index: 1;
      animation: pgSplashFadeUp 0.4s 0.45s ease both;
    }
    .pgSplashBarFill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00b4d8, #0077b6);
      animation: pgBarSlide 1.4s 0.5s ease-in-out infinite;
    }

    @keyframes pgSplashPop {
      from { opacity: 0; transform: scale(0.72); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pgSplashFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pgBarSlide {
      0%   { transform: translateX(-100%) scaleX(0.5); }
      50%  { transform: translateX(20%)  scaleX(1.2); }
      100% { transform: translateX(200%) scaleX(0.5); }
    }
  </style>

  <script>
  (function(){

    function _saveSession(d) {
      _tok = d.access_token;
      try {
        localStorage.setItem('pg_s', JSON.stringify({
          t: d.access_token,
          r: d.refresh_token || null,
          u: { id: d.user.id, email: d.user.email }
        }));

    }

    // Silently refresh the access token using the stored refresh_token
    async function _doRefresh() {
      try {
        var stored = JSON.parse(localStorage.getItem('pg_s') || 'null');
        if (!stored || !stored.r) return false;
        var resp = await fetch(BASE + '/auth/v1/token?grant_type=refresh_token', {
          method: 'POST',
          headers: { 'apikey': KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: stored.r })
        });
        if (!resp.ok) {
          // 400/401/403 = refresh token inválido/expirado/revogado → força logout
          // Outros erros (500, rede, etc.) = não desloga, apenas falha silenciosamente
          if (resp.status === 400 || resp.status === 401 || resp.status === 403) {
            _tok = null;
            try { localStorage.removeItem('pg_s'); } catch(e) {}
            if (window.__pgForceLogout) window.__pgForceLogout();
            console.warn('[PoolGuyPro] Token revoked — session cleared');
          }
          return false;
        }
        var d = await resp.json();
        if (!d.access_token) return false;
        _tok = d.access_token;
        try {
          localStorage.setItem('pg_s', JSON.stringify({
            t: d.access_token,
            r: d.refresh_token || stored.r,
            u: stored.u
          }));
        } catch(e) {}
        console.log('[PoolGuyPro] Token refreshed ✓');
        return true;
      } catch(e) {
        console.warn('[PoolGuyPro] Token refresh failed:', e.message);
        return false;
      }
    }

    // Deduplicated refresh — if already refreshing, wait for same promise
    function _refreshOnce() {
      if (_refreshing) return _refreshing;
      _refreshing = _doRefresh().finally(function(){ _refreshing = null; });
      return _refreshing;

    function _isExpired(msg) {
      return msg && (msg.includes('JWT expired') || msg.includes('invalid JWT') || msg.includes('token is expired'));

    function hdrs(extra){ var h={'apikey':KEY,'Content-Type':'application/json','Authorization':'Bearer '+(_tok||KEY)}; return Object.assign(h,extra||{}); }

    function makeBuilder(table){
      var op='select', sel='*', filters=[], orderCol=null, orderAsc=true, isSingle=false, body=null, upsertConflict='';
      var run=async function(retried){
        var url=BASE+'/rest/v1/'+table, h=hdrs();
        if(op==='upsert'){
          var uqs=upsertConflict?'?on_conflict='+encodeURIComponent(upsertConflict):'';
          var r=await fetch(url+uqs,{method:'POST',headers:Object.assign({},h,{'Prefer':'return=minimal,resolution=merge-duplicates'}),body:JSON.stringify(body)});
          if(!r.ok){var e={}; try{e=await r.json();}catch(x){} return{data:null,error:{message:e.message||'Upsert failed '+r.status}};}
          return{data:null,error:null};
        }
        if(op==='insert'){
          var ih=Object.assign({},h,{'Prefer':'return=representation'});
          if(isSingle) ih['Accept']='application/vnd.pgrst.object+json';
          var r=await fetch(url,{method:'POST',headers:ih,body:JSON.stringify(body)});
          if(!r.ok){
            var e={}; try{e=await r.json();}catch(x){}
            if(!retried && (r.status===401 || _isExpired(e.message||e.msg||''))) {
              var ok = await _refreshOnce();
              if(ok) return run(true);
            }
            return{data:null,error:{message:e.message||'Insert failed '+r.status}};
          }
          var d=await r.json();
          return{data:isSingle?d:(Array.isArray(d)?d[0]:d),error:null};
        }
        if(op==='update'){
          var qs=filters.join('&');
          var r=await fetch(url+(qs?'?'+qs:''),{method:'PATCH',headers:Object.assign({},h,{'Prefer':'return=minimal'}),body:JSON.stringify(body)});
          if(!r.ok){
            var e={}; try{e=await r.json();}catch(x){}
            if(!retried && (r.status===401 || _isExpired(e.message||e.msg||''))) {
              var ok = await _refreshOnce();
              if(ok) return run(true);
            }
            return{data:null,error:{message:e.message||'Update failed '+r.status}};
          }
          return{data:null,error:null};
        }
        if(op==='delete'){
          var qs=filters.join('&');
          var r=await fetch(url+(qs?'?'+qs:''),{method:'DELETE',headers:h});
          if(!r.ok){
            var e={}; try{e=await r.json();}catch(x){}
            if(!retried && (r.status===401 || _isExpired(e.message||e.msg||''))) {
              var ok = await _refreshOnce();
              if(ok) return run(true);
            }
            return{data:null,error:{message:e.message||'Delete failed '+r.status}};
          }
          return{data:null,error:null};
        }
        var p=['select='+encodeURIComponent(sel)];
        filters.forEach(function(f){p.push(f);});
        if(orderCol) p.push('order='+orderCol+(orderAsc?'':'.desc'));
        if(isSingle) h['Accept']='application/vnd.pgrst.object+json';
        var r=await fetch(url+'?'+p.join('&'),{headers:h});
        if(r.status===406||r.status===404) return{data:null,error:null};
        if(r.status===401 && !retried){
          var ok = await _refreshOnce();
          if(ok) return run(true);
        }
        var d=await r.json();
        if(!r.ok) return{data:null,error:{message:d.message||d.hint||'Query failed '+r.status}};
        return{data:d,error:null};
      };
      var b={
        select:function(c){sel=c||'*';return b;},
        eq:function(c,v){filters.push(c+'=eq.'+encodeURIComponent(v));return b;},
        neq:function(c,v){filters.push(c+'=neq.'+encodeURIComponent(v));return b;},
        in:function(c,arr){if(arr&&arr.length)filters.push(c+'=in.('+arr.join(',')+')');return b;},

        order:function(c,opts){orderCol=c;orderAsc=opts?opts.ascending!==false:true;return b;},

        insert:function(row){op='insert';body=row;return b;},

        then:function(res,rej){return run().then(res,rej);},
        catch:function(rej){return run().catch(rej);}
      };

          return{data:{user:d.user||d},error:null};
        },
        getSession:async function(){
          // Handle OAuth callback (Google sign-in redirect)
          if (window._pendingOAuth) {
            var pending = window._pendingOAuth;
            window._pendingOAuth = null;
            try {
              var ru = await fetch(BASE+'/auth/v1/user', { headers:{'apikey':KEY,'Authorization':'Bearer '+pending.access_token} });
              if (ru.ok) {
                var ou = await ru.json();
                _saveSession({ access_token: pending.access_token, refresh_token: pending.refresh_token, user: ou });
                _startAutoRefresh();
                return { data: { session: { user:{ id:ou.id, email:ou.email }, access_token: pending.access_token } } };
              }
            } catch(e) {}
          }
          try{var s=JSON.parse(localStorage.getItem('pg_s')||'null'); if(s&&s.u) return{data:{session:{user:s.u,access_token:s.t}}};}catch(e){}
          return{data:{session:null}};
        },
        // Proactively refresh the token — call this on page load before data fetches
        refresh: async function(){
          return _refreshOnce();
        },
        signOut:async function(){
          try{if(_tok) await fetch(BASE+'/auth/v1/logout',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+_tok}});}catch(e){}
          _tok=null; _stopAutoRefresh(); try{localStorage.removeItem('pg_s');}catch(e){}
        }
      },
      from:function(table){return makeBuilder(table);},
      channel:function(){ return{on:function(){return this;},subscribe:function(cb){setTimeout(function(){if(cb)cb('SUBSCRIBED');},100);return this;}};},
      removeChannel:function(){}
    };

    // Auto-refresh: renew the token every 18 minutes (JWT expires in 20 min)
    var _refreshTimer = null;
    function _startAutoRefresh() {
      _stopAutoRefresh();
      _refreshTimer = setInterval(function(){ _refreshOnce(); }, 18 * 60 * 1000);
    }
    function _stopAutoRefresh() {
      if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
    }
    // If already logged in from a previous session, start auto-refresh immediately
    if (_tok) _startAutoRefresh();

    // Storage API
    window.sb.storage = {
      from: function(bucket){
        return {
          upload: async function(path, file, opts, _retried){
            var ct = (opts&&opts.contentType) || (file&&file.type) || 'application/octet-stream';
            var r = await fetch(BASE+'/storage/v1/object/'+bucket+'/'+path, {
              method:'POST',
              headers:{'apikey':KEY,'Authorization':'Bearer '+(_tok||KEY),'Content-Type':ct,'x-upsert':'true'},
              body: file,
            });
            if(!r.ok){
              var e={}; try{e=await r.json();}catch(x){}
              // Auto-retry once after token refresh if JWT expired
              if(!_retried && _isExpired(e.message||e.error||'')){
                var ok = await _refreshOnce();
                if(ok) return window.sb.storage.from(bucket).upload(path, file, opts, true);
              }
              return{data:null,error:{message:e.message||'Upload failed '+r.status}};
            }
            return{data:{path:path},error:null};
          },
          getPublicUrl: function(path){
            return{data:{publicUrl:BASE+'/storage/v1/object/public/'+bucket+'/'+path}};
          }
        };
      }
    };
    window.supabase = {createClient:function(){return window.sb;}};
    console.log('[PoolGuyPro] Supabase (native fetch + auto-refresh) ✓');
  })();
  </script>

              .then(r => r.headers.get('last-modified') || r.headers.get('etag') || ''))
