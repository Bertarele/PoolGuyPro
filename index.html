  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    /* ── Desktop: phone frame centered ── */
    body {
      font-family: "Poppins", -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px 24px 32px;
      background:
        radial-gradient(60% 60% at 20% 10%, rgba(0,119,182,0.12), transparent 60%),
        radial-gradient(60% 60% at 80% 90%, rgba(0,119,182,0.10), transparent 60%),
        #eef2f7;
    }

    /* Beta banner */
    #beta-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 0.5px solid rgba(255,255,255,0.9);
      border-radius: 999px;
      padding: 9px 18px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(15,30,60,0.08);
      max-width: 500px;
      width: 100%;
    }
    #beta-banner .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #023EBA, #0077B6);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    #beta-banner .text {
      font-size: 12.5px;
      color: #4a5568;
      flex: 1;
      min-width: 160px;
      text-align: center;
    }
    #beta-banner .feedback-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #023EBA;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      text-decoration: none;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #beta-banner .feedback-btn:hover { opacity: 0.85; }

    /* Phone frame */
    #stage {
      width: 402px;
      height: 874px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.7) inset,
        0 0 0 1px rgba(15,30,60,0.12),
        0 40px 80px rgba(15,30,60,0.18),
        0 10px 24px rgba(15,30,60,0.08);
      background: var(--pg-bg);
      position: relative;
      flex-shrink: 0;
    }
    /* Dynamic island */
    #stage::after {
      content: "";
      position: absolute;
      top: 11px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px; border-radius: 24px;
      background: #000; z-index: 50; pointer-events: none;
    }
    #root { width: 100%; height: 100%; }

    /* Footer */
    #beta-footer {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(74,85,104,0.6);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* ── Mobile: full screen, no frame ── */
    @media (max-width: 480px) {
      body {
        padding: 0;
        background: var(--pg-bg);
        align-items: stretch;
        justify-content: flex-start;
        min-height: 100dvh;
      }
      #beta-banner { display: none; }
      #beta-footer  { display: none; }
      #stage {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        flex-shrink: 0;
      }
      /* hide fake dynamic island on real phones */
      #stage::after { display: none; }
      /* force the React app root div to fill the screen */
      #root, #root > div {
        width: 100% !important;
        height: 100% !important;
        border-radius: 0 !important;
        min-height: 100dvh !important;
      }
      /* hide the fake iOS status bar (9:41 overlay) */
      #root div[style*="z-index: 25"] { display: none !important; }
      /* remove the 54px top padding reserved for fake status bar */
      #root div[style*="padding-top: 54px"] { padding-top: 0 !important; }
    }
  </style>
</head>
<body>

  <!-- Beta banner (desktop only) -->
  <div id="beta-banner">
    <span class="badge">&#9889; BETA</span>
    <span class="text">Prototype in testing &mdash; sample data, real flow.</span>
    <a class="feedback-btn" href="mailto:feedback@usapoolmarket.com?subject=Feedback PoolGuyX Beta" target="_blank">
      &#128172; Give feedback
    </a>
  </div>

  <!-- App -->
  <div id="stage"><div id="root"></div></div>

  <!-- Footer (desktop only) -->
  <div id="beta-footer">PoolGuyX &nbsp;&middot;&nbsp; Your Pool. Our Priority. &nbsp;&middot;&nbsp; South Florida &nbsp;&middot;&nbsp; Beta</div>
